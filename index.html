    <!-- Custom Cosmic & Neon Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050814;
            color: white;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
            font-size: 16px !important; 
        }
        
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #050814; } 
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .stars-bg { 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat; 
            background-size: 200px 200px; 
            opacity: 0.3; 
        }
        
        @keyframes neon-glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246, 0.4), inset 0 0 10px rgba(59,130,246, 0.2); border-color: rgba(59,130,246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(168,85,247, 0.8), inset 0 0 15px rgba(168,85,247, 0.4); border-color: rgba(168,85,247, 0.8); transform: scale(1.02); }
        }
        .ad-card { animation: neon-glow-pulse 4s infinite alternate ease-in-out; }
        .ad-card:nth-child(even) { animation-delay: -2s; animation-direction: alternate-reverse; }

        @keyframes ticker-ltr {
            from { transform: translateX(-100vw); }
            to { transform: translateX(100vw); }
        }
        .animate-ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-ltr linear infinite;
        }
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }

        .glass-panel {
            background: rgba(11, 20, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>

            { id: 'f12', section: 'qualifications', label: 'المؤهل', type: 'select', options: ['بدون', 'دبلوم', 'معهد', 'كلية'], required: true, visible: true },
            { id: 'f13', section: 'qualifications', label: 'المؤهل والتخصص الدقيق', type: 'text', required: true, visible: true },

            { id: 'f20', section: 'experience', label: 'كم عدد الوظائف السابقة', type: 'number', required: false, visible: true },
            { id: 'f21', section: 'experience', label: 'كم عاما قضيتها فى سوق العمل؟', type: 'number', required: true, visible: true },
            { id: 'f22', section: 'skills', label: 'درجة إجادة اللغة الإنجليزية؟', type: 'select', options: ['ضعيف', 'مقبول', 'جيد', 'جيد جدًا', 'ممتاز'], required: true, visible: true },
            { id: 'f23', section: 'skills', label: 'هل تجيد لغات أخرى؟', type: 'text', required: true, visible: true },
            { id: 'f24', section: 'skills', label: 'هل تجيد قيادة السيارات أو الدراجات النارية؟', type: 'select', options: ['نعم', 'لا', 'إلى حدٍ ما'], required: true, visible: true },
            { id: 'f25', section: 'skills', label: 'هل لديك رخصة قيادة؟', type: 'select', options: ['نعم', 'لا'], required: true, visible: true },
            { id: 'f26', section: 'skills', label: 'المهارة/الخبرة الأولى', type: 'text', required: false, visible: true },
            { id: 'f27', section: 'skills', label: 'المهارة/الخبرة الثانية', type: 'text', required: false, visible: true },
            { id: 'f28', section: 'skills', label: 'المهارة/الخبرة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f29', section: 'skills', label: 'هل لديك أى معلومات أو مهارات ترغب فى إضافتها؟', type: 'textarea', required: true, visible: true },
            { id: 'f30', section: 'bonus', label: 'رشح أحد أصدقائك (اسمه ورقم تليفونه)', type: 'text', required: false, visible: true }
        ];

        const saveLocal = (col, data) => { 
            if(JobAppState.isOffline) localStorage.setItem('wzafny_' + col, JSON.stringify(data)); 
        };

        // --- State Management ---
        window.JobAppState = {
            isOffline: false, 
            view: 'home',
            authMode: 'login', 
            
            siteSettings: {
                name: 'منصة توظيف المصرية لخدمات الموارد البشرية وظفنى.كوم _ wzfny.com', 
                logo: '', 
                adminName: 'خالد محي الدين', 
                adminRole: 'مدير الموقع', 
                adminPhone: '01144800777', 
                adminEmail: 'khmohieldin@gmail.com', 
                aboutUs: 'منصة وظفني هي المنصة الأولى من نوعها...', 
                seekerPortalImg: '', 
                employerPortalImg: '', 
                tickerEnabled: true, 
                tickerSpeed: 30, 
                tickerMode: 'auto', 
                tickerManualText: '',
                visitorsCount: 1500 
            },
            
            secretClickCount: 0,
            loggedInAdmin: null,
            adminRecoveryMode: false,
            loggedInUser: null,
            preRegData: { role: 'seeker' }, 
            
            tempSeekerImage: '',
            tempIdImage: '',
            tempCertImage: '',
            tempAdImage: '',
            tempRating: 0,
            lastSubmittedSeeker: null, 

            adFormType: 'external',
            adminAddUserRole: 'seeker', 
            modals: { 
                login: false, 
                request: false, 
                rating: false, 
                adDetails: false, 
                adminRequestDetails: null, 
                userDetails: null, 
                adminAddUser: false, 
                bulkAdd: false,
                employerSeekerDetails: null,
                imageViewer: null,
                editField: null // لحفظ بيانات الحقل المراد تعديله
            },
            selectedItem: null, 
            search: { term: '', filterJob: 'الكل', filterExp: 'الكل' },
            adminTab: 'system_admins',
            usersSubTab: 'seekers',
            employerSeekersViewMode: 'cards',

            // Data Arrays
            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' }],
            messages: [], 
            formFields: [...fullDefaultFields], 
            seekers: [],
            employers: [],
            requests: [],
            ads: []
        };

        // --- Global Secret Click Listener ---
        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;

            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);

            if (JobAppState.secretClickCount >= 5) {
                JobAppState.secretClickCount = 0;
                JobAppState.modals.login = true;
                JobApp.render();
            }
        });

        // --- Firebase Initial Seeder ---
        async function seedDefaultsAndCount() {
            try {
                const settingsRef = doc(db, 'settings', 'global');
                const settingsSnap = await getDoc(settingsRef);
                
                if(!settingsSnap.exists()) {
                    await setDoc(settingsRef, JobAppState.siteSettings);
                } else {
                    await updateDoc(settingsRef, { visitorsCount: increment(1) });
                }

                const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                if(adminsSnap.empty) {
                    await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
                }
                const fieldsSnap = await getDocs(collection(db, 'formFields'));
                if(fieldsSnap.empty || fieldsSnap.size < 15) {
                    for(let f of fullDefaultFields) {
                        await setDoc(doc(db, 'formFields', f.id), f);
                    }
                }
            } catch (e) { console.log("Seeding skipped", e); }
        }

        // --- Core Framework ---
        window.JobApp = {
            renderTimer: null,
            init: async function() {
                try {
                    if (window.location.protocol === 'file:') throw new Error("PROTOCOL_ERROR");
                    await signInAnonymously(auth);
                    
                    const settingsRef = doc(db, 'settings', 'global');
                    const settingsSnap = await getDoc(settingsRef);
                    if(!settingsSnap.exists()) await setDoc(settingsRef, JobAppState.siteSettings);
                    else await updateDoc(settingsRef, { visitorsCount: increment(1) });

                    const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                    if(adminsSnap.empty) await addDoc(collection(db, 'systemAdmins'), { id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' });
                    
                    const fieldsSnap = await getDocs(collection(db, 'formFields'));
                    if(fieldsSnap.empty || fieldsSnap.size < 15) {
                        for(let f of fullDefaultFields) await setDoc(doc(db, 'formFields', f.id), f);
                    }
                    
                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.syncSession(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });

                } catch(e) {
                    JobAppState.isOffline = true;
                    JobAppState.siteSettings.visitorsCount++; 
                    
                    // نظام التخزين المحلي لضمان عدم ضياع البيانات
                    ['seekers', 'employers', 'requests', 'ads', 'messages', 'systemAdmins', 'formFields'].forEach(col => {
                        const stored = localStorage.getItem('wzafny_' + col);
                        if(stored) JobAppState[col] = JSON.parse(stored);
                    });
                    
                    if (JobAppState.formFields.length === 0) JobAppState.formFields = [...fullDefaultFields];
                    if (JobAppState.systemAdmins.length === 0) JobAppState.systemAdmins = [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' }];
                    
                    this.syncSession(); 
                    this.render(); 
                }
            },
            
            syncSession: function() {
                if (JobAppState.loggedInUser) {
                    if (JobAppState.loggedInUser.role === 'seeker') {
                        const updated = JobAppState.seekers.find(s => s.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'seeker' };
                    } else if (JobAppState.loggedInUser.role === 'employer') {
                        const updated = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'employer' };
                    }
                } else {
                    const uAuth = localStorage.getItem('wzafny_user');
                    if (uAuth) {
                        try {
                            const { id, role } = JSON.parse(uAuth);
                            if (role === 'seeker') {
                                const s = JobAppState.seekers.find(x => x.id === id);
                                if (s) JobAppState.loggedInUser = { ...s, role };
                            } else if (role === 'employer') {
                                const e = JobAppState.employers.find(x => x.id === id);
                                if (e) JobAppState.loggedInUser = { ...e, role };
                            }
                        } catch(e) {}
                    }
                }

                if (JobAppState.loggedInAdmin) {
                    const updated = JobAppState.systemAdmins.find(a => a.id === JobAppState.loggedInAdmin.id);
                    if(updated) JobAppState.loggedInAdmin = updated;
                } else {
                    const aAuth = localStorage.getItem('wzafny_admin');
                    if (aAuth) {
                        try {
                            const { email, pass } = JSON.parse(aAuth);
                            const a = JobAppState.systemAdmins.find(x => x.email === email && x.password === pass);
                            if (a) JobAppState.loggedInAdmin = a;
                        } catch(e) {}
                    }
                }
            },

            render: function() {
                if (this.renderTimer) clearTimeout(this.renderTimer);
                this.renderTimer = setTimeout(() => this._doRender(), 50);
            },

            _doRender: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;
                let currentViewHtml = this.views[JobAppState.view] ? this.views[JobAppState.view]() : this.views.home();
                appDiv.innerHTML = `${this.components.Header()}<main class="flex-grow pb-20">${currentViewHtml}</main>${this.components.Modals()}`;
                if (window.lucide) { lucide.createIcons(); }
            },
            
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            actions: {
                viewImage(imgSrc) {
                    JobAppState.modals.imageViewer = imgSrc;
                    JobApp.render();
                },
                closeImageViewer() {
                    JobAppState.modals.imageViewer = null;
                    JobApp.render();
                },
                downloadImage(imgSrc) {
                    const a = document.createElement('a');
                    a.href = imgSrc;
                    a.download = 'صورة_مرفقة.png'; // الاسم الافتراضي
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                },

                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        localStorage.setItem('wzafny_admin', JSON.stringify({ email: admin.email, pass: admin.password })); 
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');
                    } else { alert('بيانات الدخول غير صحيحة!'); }
                },
                adminRecoverySubmit(e) { e.preventDefault(); alert('تم إرسال رابط استعادة كلمة المرور إلى البريد الإلكتروني للمدير بنجاح!'); JobAppState.adminRecoveryMode = false; JobApp.render(); },
                startAuth(mode, role = 'seeker') { JobAppState.authMode = mode; JobAppState.preRegData.role = role; JobApp.navigate('auth'); },
                userLoginSubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    let user = JobAppState.seekers.find(s => s.email === email && s.password === pass);
                    if (user) { JobAppState.loggedInUser = { ...user, role: 'seeker' }; localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'seeker' })); JobAppState.modals.userLogin = false; JobApp.navigate('seeker_profile'); return; }
                    user = JobAppState.employers.find(emp => emp.email === email && emp.password === pass);
                    if (user) { JobAppState.loggedInUser = { ...user, role: 'employer' }; localStorage.setItem('wzafny_user', JSON.stringify({ id: user.id, role: 'employer' })); JobAppState.modals.userLogin = false; JobApp.navigate('employer_form'); return; }
                    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                },
                secretClick() {},
                userLogout() { JobAppState.loggedInUser = null; JobAppState.loggedInAdmin = null; localStorage.removeItem('wzafny_user'); localStorage.removeItem('wzafny_admin'); JobApp.navigate('home'); },
                userRecoverySubmit(e) { e.preventDefault(); alert('تم إرسال تعليمات استعادة كلمة المرور إلى بريدك بنجاح!'); JobAppState.authMode = 'login'; JobApp.render(); },
                async submitRegister(e) {
                    e.preventDefault();

                            canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);

                async handleBulkAdd(e) {
                    e.preventDefault();
                    const csv = e.target.csvData.value;
                    const rows = csv.split('\n').filter(r => r.trim().length > 0);
                    if (rows.length < 2) return alert("الملف يجب أن يحتوي على صف للعناوين وصف واحد على الأقل للبيانات.");

                    const headers = rows[0].split(',').map(h => h.trim());
                    
                    const map = {
                        name: headers.findIndex(h => h.includes('اسم') || h.includes('Name')),
                        email: headers.findIndex(h => h.includes('بريد') || h.includes('ايميل') || h.includes('Email')),
                        password: headers.findIndex(h => h.includes('سر') || h.includes('مرور') || h.includes('Password')),
                        jobTitle: headers.findIndex(h => h.includes('وظيف') || h.includes('Job')),
                        phone: headers.findIndex(h => h.includes('هاتف') || h.includes('تليفون') || h.includes('محمول') || h.includes('Phone')),
                        experience: headers.findIndex(h => h.includes('خبر') || h.includes('Experience'))
                    };

                    let fieldMap = {};
                    JobAppState.formFields.forEach(f => {
                        const idx = headers.findIndex(h => h === f.label || h.includes(f.label) || f.label.includes(h));
                        if (idx > -1) fieldMap[idx] = f.id;
                    });

                    let added = 0;
                    for(let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(c => c.trim());
                        if(cols.length >= 2) {
                            const name = map.name > -1 && cols[map.name] ? cols[map.name] : 'بدون اسم';
                            const email = map.email > -1 && cols[map.email] ? cols[map.email] : `user${Date.now()}${i}@wzfny.com`;
                            const password = map.password > -1 && cols[map.password] ? cols[map.password] : '123456';
                            const jobTitle = map.jobTitle > -1 && cols[map.jobTitle] ? cols[map.jobTitle] : 'غير محدد';
                            const phone = map.phone > -1 && cols[map.phone] ? cols[map.phone] : '';
                            const experience = map.experience > -1 && cols[map.experience] ? parseInt(cols[map.experience]) || 0 : 0;

                            let formData = {};
                            for (let c = 0; c < cols.length; c++) {
                                if (fieldMap[c]) {
                                    formData[fieldMap[c]] = cols[c];
                                }
                            }

                            const newSeeker = { 
                                name, email, password, jobTitle, phone, experience, 
                                skills: [], isVisible: true, isHired: false, rating: 0, reviewsCount: 0, profileImage: '', 
                                formData: formData 
                            };

                            if (!JobAppState.isOffline) {
                                await addDoc(collection(db, 'seekers'), newSeeker);
                            } else { 
                                newSeeker.id = Date.now().toString() + Math.random(); 
                                JobAppState.seekers.unshift(newSeeker); 
                                saveLocal('seekers', JobAppState.seekers); 
                            }
                            added++;
                        }
                    }
                    alert(`تمت إضافة ${added} موظفين بنجاح`); 
                    JobAppState.modals.bulkAdd = false; 
                    JobApp.render();
                },

                        const fields = JobAppState.formFields.filter(f => f.section === section && f.visible);

                            if(!val) { if(f.label.includes('الاسم')) val = JobAppState.loggedInUser.name; if(f.type === 'email') val = JobAppState.loggedInUser.email; if(f.type === 'tel' && f.id === 'f8') val = JobAppState.loggedInUser.phone || ''; }

                            let inputHtml = '';
                            if (f.id === 'f3') inputHtml = `<input name="${f.id}" value="${val}" type="text" dir="ltr" required pattern="\\d{14}" maxlength="14" minlength="14" oninput="this.value=this.value.replace(/[^0-9]/g,'');" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 text-left">`;

                            else if(f.type === 'textarea') inputHtml = `<textarea name="${f.id}" ${f.required?'required':''} rows="3" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 resize-none">${val}</textarea>`;
                            else inputHtml = `<input name="${f.id}" value="${val}" type="${f.type}" ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'dir="ltr"' : ''} ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'text-left' : ''}">`;

                            ${admin.type === 'super_admin' ? `
                                <button onclick="JobAppState.adminTab='settings_form'; JobApp.render()" class="whitespace-nowrap px-4 md:px-6 py-3 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 ${JobAppState.adminTab==='settings_form'?'bg-amber-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="plus-square"></i> مصمم الاستمارة</button>
                                <button onclick="JobAppState.adminTab='ads'; JobApp.render()" class="whitespace-nowrap px-4 md:px-6 py-3 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 ${JobAppState.adminTab==='ads'?'bg-emerald-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="megaphone"></i> الإعلانات</button>
                                <button onclick="JobAppState.adminTab='messages'; JobApp.render()" class="whitespace-nowrap px-4 md:px-6 py-3 rounded-xl font-bold text-xs md:text-sm flex items-center gap-2 ${JobAppState.adminTab==='messages'?'bg-rose-600 text-white shadow-lg':'text-slate-400 hover:bg-white/5 hover:text-white'}"><i data-lucide="mail"></i> رسائل التواصل</button>
                            ` : ''}
                        </div>
                        ${tabContent}
                    </div>`;
                },

                success() {
                    let pdfBtnHtml = '';
                    if(JobAppState.lastSubmittedSeeker) {
                        pdfBtnHtml = `
                        <button onclick="JobApp.actions.downloadPDF()" class="mt-4 bg-emerald-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-emerald-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">
                            <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i> تحميل الاستمارة (PDF)
                        </button>
                        `;
                    }
                    return `
                    <div class="flex items-center justify-center min-h-[60vh] p-4 fade-in">
                        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-lg w-full border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.2)]">
                            <i data-lucide="check-circle-2" class="w-16 h-16 md:w-20 md:h-20 text-green-400 mx-auto mb-4 md:mb-6"></i>
                            <h2 class="text-2xl md:text-3xl font-black text-white mb-4">تمت العملية بنجاح!</h2>
                            <p class="text-slate-300 mb-8">تم حفظ وتحديث بياناتك في المنصة.</p>
                            ${pdfBtnHtml}
                            <button onclick="JobApp.navigate('seeker_profile')" class="mt-4 bg-blue-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-blue-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">
                                <i data-lucide="user" class="w-4 h-4 md:w-5 md:h-5"></i> العودة لملفي الشخصي
                            </button>
                        </div>
                    </div>`;
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => { 
            window.JobApp.init(); 
        });

    </script>
</body>
</html>
