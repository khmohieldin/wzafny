<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وظفني - منصة التوظيف الذكية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2pdf Library for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Custom Cosmic & Neon Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050814;
            color: white;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
            /* منع الزوم التلقائي في الآيفون */
            font-size: 16px !important; 
        }
        
        ::-webkit-scrollbar { width: 6px; } 
        ::-webkit-scrollbar-track { background: #050814; } 
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        /* إخفاء شريط التمرير الأفقي للهواتف */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .stars-bg { 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat; 
            background-size: 200px 200px; 
            opacity: 0.3; 
        }
        
        @keyframes neon-glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246, 0.4), inset 0 0 10px rgba(59,130,246, 0.2); border-color: rgba(59,130,246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(168,85,247, 0.8), inset 0 0 15px rgba(168,85,247, 0.4); border-color: rgba(168,85,247, 0.8); transform: scale(1.02); }
        }
        .ad-card { animation: neon-glow-pulse 4s infinite alternate ease-in-out; }
        .ad-card:nth-child(even) { animation-delay: -2s; animation-direction: alternate-reverse; }

        .glass-panel {
            background: rgba(11, 20, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* لتنسيق حقل التاريخ */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white">

    <div class="fixed inset-0 pointer-events-none z-0 stars-bg"></div>
    <div class="fixed top-[-10%] right-[-10%] w-[50rem] h-[50rem] rounded-full bg-blue-900/40 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] left-[-10%] w-[60rem] h-[60rem] rounded-full bg-purple-900/30 blur-[150px] pointer-events-none z-0"></div>

    <!-- UI Container -->
    <div id="app" class="relative z-10 min-h-screen flex flex-col"></div>

    <!-- Firebase Integration as Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-E7BLDMOeysO8LaMwsuCF1kDbbmeQtzU",
            authDomain: "wzafny-7b4e3.firebaseapp.com",
            projectId: "wzafny-7b4e3",
            storageBucket: "wzafny-7b4e3.firebasestorage.app",
            messagingSenderId: "736863444532",
            appId: "1:736863444532:web:2a3b9881dd3fa51757b461",
            measurementId: "G-V06FDTKW19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.db = db;

        const fullDefaultFields = [
            { id: 'f1', section: 'personal', label: 'الاسم بالكامل "ثلاثى"', type: 'text', required: true, visible: true },
            { id: 'f2', section: 'personal', label: 'عام الميلاد', type: 'number', required: true, visible: true },
            { id: 'f3', section: 'personal', label: 'الرقم القومى (14 رقم)', type: 'text', required: true, visible: true },
            { id: 'f4', section: 'personal', label: 'الحالة الاجتماعية', type: 'select', options: ['أعزب', 'متزوج', 'أخرى'], required: true, visible: true },
            { id: 'f5', section: 'personal', label: 'الموقف من التجنيد أو الخدمة العامة', type: 'select', options: ['أدى الخدمة', 'إعفاء نهائى', 'إعفاء مؤقت', 'غير مطلوب .. "للبنات فقط"'], required: true, visible: true },
            { id: 'f6', section: 'personal', label: 'الحالة الصحية', type: 'text', required: true, visible: true },
            { id: 'f7', section: 'contact', label: 'عنوان بريد إلكتروني', type: 'email', required: true, visible: true },
            { id: 'f8', section: 'contact', label: 'رقم المحمول الأساسي', type: 'tel', required: true, visible: true },
            { id: 'f9', section: 'contact', label: 'رقم محمول آخر', type: 'tel', required: true, visible: true },
            { id: 'f9_name', section: 'contact', label: 'اسم صاحب الرقم الآخر', type: 'text', required: true, visible: true },
            { id: 'f10', section: 'contact', label: 'واتساب', type: 'tel', required: true, visible: true },
            { id: 'f31', section: 'contact', label: 'رابط حساب فيسبوك (اختياري)', type: 'text', required: false, visible: true },
            { id: 'f11', section: 'contact', label: 'العنوان بالتفصيل', type: 'textarea', required: true, visible: true },
            { id: 'f12', section: 'qualifications', label: 'المؤهل', type: 'select', options: ['بدون', 'دبلوم', 'معهد', 'كلية'], required: true, visible: true },
            { id: 'f13', section: 'qualifications', label: 'المؤهل والتخصص الدقيق', type: 'text', required: true, visible: true },
            { id: 'f14', section: 'qualifications', label: 'تاريخ التخرج', type: 'date', required: true, visible: true },
            { id: 'f15', section: 'experience', label: 'الوظيفة المطلوبة', type: 'text', required: true, visible: true },
            { id: 'f16', section: 'experience', label: 'الراتب المتوقع', type: 'text', required: true, visible: true },
            { id: 'f17', section: 'experience', label: 'الوظيفة الأولى', type: 'text', required: false, visible: true },
            { id: 'f18', section: 'experience', label: 'الوظيفة الثانية', type: 'text', required: false, visible: true },
            { id: 'f19', section: 'experience', label: 'الوظيفة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f20', section: 'experience', label: 'كم عدد الوظائف السابقة', type: 'number', required: false, visible: true },
            { id: 'f21', section: 'experience', label: 'كم عاما قضيتها فى سوق العمل؟', type: 'number', required: true, visible: true },
            { id: 'f22', section: 'skills', label: 'درجة إجادة اللغة الإنجليزية؟', type: 'select', options: ['ضعيف', 'مقبول', 'جيد', 'جيد جدًا', 'ممتاز'], required: true, visible: true },
            { id: 'f23', section: 'skills', label: 'هل تجيد لغات أخرى؟', type: 'text', required: true, visible: true },
            { id: 'f24', section: 'skills', label: 'هل تجيد قيادة السيارات أو الدراجات النارية؟', type: 'select', options: ['نعم', 'لا', 'إلى حدٍ ما'], required: true, visible: true },
            { id: 'f25', section: 'skills', label: 'هل لديك رخصة قيادة؟', type: 'select', options: ['نعم', 'لا'], required: true, visible: true },
            { id: 'f26', section: 'skills', label: 'المهارة/الخبرة الأولى', type: 'text', required: false, visible: true },
            { id: 'f27', section: 'skills', label: 'المهارة/الخبرة الثانية', type: 'text', required: false, visible: true },
            { id: 'f28', section: 'skills', label: 'المهارة/الخبرة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f29', section: 'skills', label: 'هل لديك أى معلومات أو مهارات ترغب فى إضافتها؟', type: 'textarea', required: true, visible: true },
            { id: 'f30', section: 'bonus', label: 'رشح أحد أصدقائك (اسمه ورقم تليفونه)', type: 'text', required: false, visible: true }
        ];

        // --- State Management ---
        window.JobAppState = {
            isOffline: false, 
            view: 'home',
            authMode: 'login', 
            
            siteSettings: {
                name: 'وظفني', logo: '', adminName: 'خالد محي الدين', adminRole: 'مدير الموقع', adminPhone: '6762112', adminEmail: 'khmohieldin@gmail.com', aboutUs: 'منصة وظفني هي المنصة الأولى من نوعها...', seekerPortalImg: '', employerPortalImg: ''
            },
            
            secretClickCount: 0,
            loggedInAdmin: null,
            adminRecoveryMode: false,
            loggedInUser: null,
            preRegData: { role: 'seeker' }, 
            
            tempSeekerImage: '',
            tempAdImage: '',
            tempRating: 0,
            lastSubmittedSeeker: null, 

            adFormType: 'external',
            adminAddUserRole: 'seeker', 
            modals: { login: false, request: false, rating: false, adDetails: false, adminRequestDetails: null, userDetails: null, adminAddUser: false },
            selectedItem: null, 
            search: { term: '', location: '', exp: '' },
            adminTab: 'system_admins',
            usersSubTab: 'seekers',

            // Data Arrays
            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '6762112', password: '123456', type: 'super_admin', profileImage: '', website: 'https://khaled-tech.com', color: 'green' }],
            messages: [], 
            formFields: [...fullDefaultFields], 
            seekers: [],
            employers: [],
            requests: [],
            ads: []
        };

        // --- Global Secret Click Listener ---
        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;

            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);

            if (JobAppState.secretClickCount >= 5) {
                JobAppState.secretClickCount = 0;
                JobAppState.modals.login = true;
                JobApp.render();
            }
        });

        // --- Firebase Initial Seeder ---
        async function seedDefaults() {
            const settingsSnap = await getDocs(collection(db, 'settings'));
            if(settingsSnap.empty) {
                await setDoc(doc(db, 'settings', 'global'), JobAppState.siteSettings);
            }
            const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
            if(adminsSnap.empty) {
                await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
            }
            const fieldsSnap = await getDocs(collection(db, 'formFields'));
            if(fieldsSnap.empty || fieldsSnap.size < 15) {
                for(let f of fullDefaultFields) {
                    await setDoc(doc(db, 'formFields', f.id), f);
                }
            }
        }

        // --- Core Framework ---
        window.JobApp = {
            init: async function() {
                this.render(); 

                try {
                    if (window.location.protocol === 'file:') throw new Error("PROTOCOL_ERROR");
                    await signInAnonymously(auth);
                    await seedDefaults();
                    
                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });

                } catch(e) {
                    console.warn("تنبيه: تعمل المنصة في وضع التجربة المحلي (الذاكرة المؤقتة). للربط السحابي، استخدم Live Server.", e);
                    JobAppState.isOffline = true;
                    this.render(); 
                }
            },
            
            render: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;

                let currentViewHtml = '';
                if (this.views && typeof this.views[JobAppState.view] === 'function') {
                    currentViewHtml = this.views[JobAppState.view]();
                } else {
                    currentViewHtml = this.views.home();
                }

                appDiv.innerHTML = `
                    ${this.components.Header()}
                    <main class="flex-grow pb-20">
                        ${currentViewHtml}
                    </main>
                    ${this.components.Modals()}
                `;
                
                if (window.lucide) { lucide.createIcons(); }
            },
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            // --- Actions ---
            actions: {
                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');
                    } else {
                        alert('بيانات الدخول غير صحيحة!');
                    }
                },
                adminRecoverySubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const exists = JobAppState.systemAdmins.some(a => a.email === email);
                    if (exists) {
                        alert('تم إرسال رابط استعادة كلمة المرور إلى البريد الإلكتروني للمدير بنجاح!');
                        JobAppState.adminRecoveryMode = false;
                        JobApp.render();
                    } else {
                        alert('هذا البريد الإلكتروني غير مسجل كمدير في النظام.');
                    }
                },
                startAuth(mode, role = 'seeker') {
                    JobAppState.authMode = mode;
                    JobAppState.preRegData.role = role;
                    JobApp.navigate('auth');
                },
                userLoginSubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    
                    let user = JobAppState.seekers.find(s => s.email === email && s.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'seeker' };
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('seeker_form'); 
                        return;
                    }
                    
                    user = JobAppState.employers.find(emp => emp.email === email && emp.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'employer' };
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('employer_form');
                        return;
                    }
                    
                    alert('البريد الإلكتروني أو كلمة المرور غير صحيحة.');
                },
                secretClick() {
                    // مُعالجة النقرة السرية تم تداركها بالكامل بالأسفل بالاعتماد على event listener عام
                },
                userLogout() {
                    JobAppState.loggedInUser = null;
                    JobApp.navigate('home');
                },
                userRecoverySubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const existsSeeker = JobAppState.seekers.some(s => s.email === email);
                    const existsEmp = JobAppState.employers.some(emp => emp.email === email);
                    
                    if (existsSeeker || existsEmp) {
                        alert('تم إرسال تعليمات استعادة كلمة المرور إلى بريدك بنجاح!');
                        JobAppState.authMode = 'login';
                        JobApp.render();
                    } else {
                        alert('عفواً، هذا البريد غير مسجل لدينا.');
                    }
                },
                async submitRegister(e) {
                    e.preventDefault();
                    const name = e.target.name.value;
                    const email = e.target.email.value;
                    const password = e.target.password.value;
                    const role = e.target.role.value;
                    
                    if(JobAppState.seekers.some(s => s.email === email) || JobAppState.employers.some(emp => emp.email === email)) {
                        return alert("هذا البريد الإلكتروني مستخدم بالفعل. يرجى تسجيل الدخول.");
                    }

                    if (role === 'seeker') {
                        const newSeeker = { name, email, password, phone: '', profileImage: '', isVisible: false, rating: 0, reviewsCount: 0, jobTitle: '', experience: 0, skills: [] };
                        if (!JobAppState.isOffline) {
                            try {
                                const docRef = await addDoc(collection(db, 'seekers'), newSeeker);
                                JobAppState.loggedInUser = { id: docRef.id, ...newSeeker, role: 'seeker' };
                            } catch(err) { return alert("خطأ: " + err.message); }
                        } else {
                            newSeeker.id = Date.now().toString();
                            JobAppState.seekers.unshift(newSeeker);
                            JobAppState.loggedInUser = { ...newSeeker, role: 'seeker' };
                        }
                        JobApp.navigate('seeker_form'); 

                    } else {
                        const newEmp = { name, email, password, phone: '', profileImage: '', date: new Date().toLocaleDateString('ar-EG'), points: 0, requestsCount: 0 };
                        if (!JobAppState.isOffline) {
                            try {
                                const docRef = await addDoc(collection(db, 'employers'), newEmp);
                                JobAppState.loggedInUser = { id: docRef.id, ...newEmp, role: 'employer' };
                            } catch(err) { return alert("خطأ: " + err.message); }
                        } else {
                            newEmp.id = Date.now().toString();
                            JobAppState.employers.unshift(newEmp);
                            JobAppState.loggedInUser = { ...newEmp, role: 'employer' };
                        }
                        JobApp.navigate('employer_form'); 
                    }
                },
                async submitSeekerForm(e) {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const data = Object.fromEntries(formData.entries());
                    
                    const updatedSeeker = {
                        ...JobAppState.loggedInUser,
                        name: data.f1 || JobAppState.loggedInUser.name,
                        age: data.f2 || 25,
                        location: data.f11 || 'غير محدد',
                        phone: data.f8 || '',
                        jobTitle: data.f15 || 'غير محدد',
                        experience: data.f21 || 0,
                        skills: [data.f26, data.f27, data.f28].filter(Boolean),
                        english: data.f22 || 'مقبول',
                        topStrengths: data.f29 || 'موظف طموح',
                        previousJobs: [data.f17, data.f18, data.f19].filter(Boolean),
                        isVisible: true,
                        profileImage: JobAppState.tempSeekerImage || JobAppState.loggedInUser.profileImage || '',
                        formData: data
                    };
                    
                    if (!JobAppState.isOffline) {
                        try {
                            const { role, id, ...dbData } = updatedSeeker;
                            await updateDoc(doc(db, 'seekers', JobAppState.loggedInUser.id), dbData);
                        } catch(err) { return alert("خطأ في الحفظ: " + err.message); }
                    } else {
                        const idx = JobAppState.seekers.findIndex(s => s.id === JobAppState.loggedInUser.id);
                        if(idx > -1) JobAppState.seekers[idx] = updatedSeeker;
                    }

                    JobAppState.loggedInUser = { ...updatedSeeker, role: 'seeker' };
                    JobAppState.lastSubmittedSeeker = updatedSeeker; 
                    JobAppState.tempSeekerImage = '';
                    JobApp.navigate('success');
                },
                
                downloadPDF() {
                    const seeker = JobAppState.lastSubmittedSeeker;
                    if(!seeker) return alert("لا توجد بيانات للاستمارة الحالية.");
                    
                    let htmlContent = `
                        <div style="direction: rtl; font-family: 'Cairo', sans-serif; padding: 40px; color: #000; background: #fff;">
                            <h1 style="text-align: center; color: #1e3a8a; margin-bottom: 30px; font-weight: 900; font-size: 24px; border-bottom: 2px solid #1e3a8a; padding-bottom: 10px;">استمارة طلب وظيفة - منصة ${JobAppState.siteSettings.name}</h1>
                            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                                <tbody>
                    `;
                    
                    JobAppState.formFields.forEach(f => {
                        if(seeker.formData && seeker.formData[f.id]) {
                            htmlContent += `
                            <tr>
                                <td style="padding: 12px; border: 1px solid #cbd5e1; font-weight: bold; width: 35%; background: #f8fafc; font-size: 14px;">${f.label}</td>
                                <td style="padding: 12px; border: 1px solid #cbd5e1; width: 65%; font-size: 14px;">${seeker.formData[f.id]}</td>
                            </tr>`;
                        }
                    });
                    
                    htmlContent += `</tbody></table></div>`;

                async submitRating(e) {
                    e.preventDefault();
                    const stars = JobAppState.tempRating;
                    const feedback = e.target.feedback.value;
                    
                    if(stars < 1 || stars > 5) return alert("يرجى اختيار التقييم بالنجوم أولاً");
                    if(!feedback.trim()) return alert("يرجى كتابة تعليق يوضح سبب التقييم (إجباري)");
                    
                    const req = JobAppState.selectedItem;
                    const emp = JobAppState.employers.find(x => x.phone === req.employerPhone);
                    const seeker = JobAppState.seekers.find(s => s.id === req.seeker.id);

                    try {
                        if (!JobAppState.isOffline) {
                            await updateDoc(doc(db, 'requests', req.id), { isRated: true, ratingGiven: stars, ratingFeedback: feedback });
                            if(emp) await updateDoc(doc(db, 'employers', emp.id), { points: emp.points + 5 });
                            if(seeker) {
                                const newCount = seeker.reviewsCount + 1;
                                const newRating = Number((((seeker.rating * seeker.reviewsCount) + stars) / newCount).toFixed(1));
                                await updateDoc(doc(db, 'seekers', seeker.id), { reviewsCount: newCount, rating: newRating });
                            }
                        } else {
                            req.isRated = true; req.ratingGiven = stars; req.ratingFeedback = feedback;
                            if(emp) emp.points += 5;
                            if(seeker) {
                                seeker.reviewsCount++;
                                seeker.rating = Number((((seeker.rating * (seeker.reviewsCount - 1)) + stars) / seeker.reviewsCount).toFixed(1));
                            }
                        }

                        if(emp && JobAppState.loggedInUser && JobAppState.loggedInUser.id === emp.id) {
                            JobAppState.loggedInUser.points = emp.points;
                        }

                        JobAppState.modals.rating = false;
                        alert('تم التقييم بنجاح! تم إضافة 5 نقاط إلى محفظتك 🎁');
                        JobApp.render();
                    } catch(err) {
                        alert("خطأ أثناء تسجيل التقييم: " + err.message);
                    }
                },

                uploadImage(inputElement, callbackKey) {
                    const file = inputElement.files[0];
                    if(!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = event => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 

                            if(callbackKey === 'siteLogo') { JobAppState.siteSettings.logo = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'seekerPortalImg') { JobAppState.siteSettings.seekerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerPortalImg') { JobAppState.siteSettings.employerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempSeekerImage') { JobAppState.tempSeekerImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempAdImage') { JobAppState.tempAdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerProfileImage') {
                                const emp = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                                if(emp) {
                                    emp.profileImage = compressedBase64;
                                    if(!JobAppState.isOffline) updateDoc(doc(db, 'employers', emp.id), { profileImage: compressedBase64 }).catch(e=>console.log(e));
                                }
                                JobAppState.loggedInUser.profileImage = compressedBase64;
                                JobApp.render();
                            }
                        }
                    }
                    reader.readAsDataURL(file);
                },

                    if(type === 'employer') JobAppState.siteSettings.employerPortalImg = '';

                                            <div class="bg-slate-800/50 p-4 rounded-xl border border-white/5"><span class="text-slate-400 text-xs block mb-1">النقاط</span><span class="text-amber-400 font-bold text-xl">${data.points}</span></div>

                            </div>
                            <div class="text-left mt-2">
                                <a href="#" onclick="JobAppState.authMode='recovery'; JobApp.render()" class="text-blue-400 hover:text-blue-300 text-xs md:text-sm font-bold transition-colors">نسيت كلمة المرور؟</a>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg mt-4">تسجيل الدخول</button>

                        <div class="mt-6 text-center text-slate-400 text-xs md:text-sm">

                        </div>`;
                    } 
                    else if (mode === 'register') {
                        formHtml = `
                        <div class="text-center mb-6 md:mb-8">

                                </select>

                                <label class="block text-xs md:text-sm font-bold text-white mb-1">الاسم الكامل / اسم الشركة <span class="text-rose-400">*</span></label>

                            </div>
                            <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-2 md:grid md:grid-cols-4 md:pb-0 snap-x">
                                ${JobAppState.ads.slice(0,4).map(ad => `
                                ${ad.type === 'external' ? `
                                <a href="${ad.link}" target="_blank" class="shrink-0 w-64 md:w-auto snap-center ad-card bg-slate-900/50 backdrop-blur-sm rounded-2xl overflow-hidden aspect-square relative group border-2 block">
                                    <img src="${ad.imageUrl}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-500 group-hover:scale-110">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent flex flex-col justify-end p-4">

                                </a>
                                ` : `
                                <div onclick="JobAppState.selectedItem = JobAppState.ads.find(a=>a.id==='${ad.id}'); JobAppState.modals.adDetails=true; JobApp.render()" class="shrink-0 w-64 md:w-auto snap-center ad-card cursor-pointer bg-slate-900/50 backdrop-blur-sm rounded-2xl overflow-hidden aspect-square relative group border-2 block">
                                    <img src="${ad.imageUrl}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-500 group-hover:scale-110">

                                        <h4 class="text-white font-bold text-sm md:text-base leading-tight drop-shadow-md line-clamp-2">${ad.title}</h4>
                                    </div>
                                </div>
                                `}
                                `).join('')}
                            </div>
                        </div>`;

                        const action = user ? "JobApp.navigate('seeker_form')" : "JobApp.actions.startAuth('register', 'seeker')";

                        seekerCardHtml = `
                            <div class="relative group cursor-pointer h-full" onclick="${action}">
                                <div class="absolute inset-0 bg-gradient-to-b from-blue-400 to-blue-800 rounded-3xl blur-md opacity-40 group-hover:opacity-70 transition-opacity"></div>

                                </div>
                            </div>
                        `;

                                    <a href="mailto:${settings.adminEmail}" class="flex items-center gap-4 bg-white/5 p-4 rounded-xl hover:bg-white/10 transition-colors group overflow-hidden">
                                        <div class="bg-rose-500/20 p-3 rounded-full text-rose-400 group-hover:scale-110 transition-transform shrink-0"><i data-lucide="mail"></i></div>
                                        <div class="overflow-hidden"><p class="text-xs md:text-sm text-slate-400">البريد الإلكتروني</p><p class="text-white font-bold text-sm md:text-lg break-all" dir="ltr">${settings.adminEmail}</p></div>

                            <div class="bg-slate-800/50 border border-slate-700 p-6 md:p-8 rounded-3xl">

                            </div>

                    </div>`;
                },

                seeker_form() {
                    if (!JobAppState.loggedInUser || JobAppState.loggedInUser.role !== 'seeker') {

                    }

                    const getFieldsHTML = (section) => {
                        const fields = JobAppState.formFields.filter(f => f.section === section && f.visible);
                        if(fields.length === 0) return '';
                        return fields.map(f => {
                            const req = f.required ? '<span class="text-rose-400">*</span>' : '';
                            const fullW = f.type === 'textarea' || f.label.length > 50 ? 'md:col-span-2' : '';
                            
                            let val = '';
                            if (JobAppState.loggedInUser.formData && JobAppState.loggedInUser.formData[f.id]) {
                                val = JobAppState.loggedInUser.formData[f.id];
                            } else {
                                if(f.label.includes('الاسم')) val = JobAppState.loggedInUser.name;
                                if(f.type === 'email') val = JobAppState.loggedInUser.email;
                                if(f.type === 'tel' && f.id === 'f8') val = JobAppState.loggedInUser.phone || '';
                            }

                            let inputHtml = '';
                            if (f.id === 'f3') {
                                inputHtml = `<input name="${f.id}" value="${val}" type="text" dir="ltr" required pattern="\\d{14}" maxlength="14" minlength="14" title="يجب إدخال 14 رقم فقط" oninput="this.value=this.value.replace(/[^0-9]/g,'');" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 text-left">`;
                            }
                            else if(f.type === 'select') {
                                inputHtml = `<select name="${f.id}" ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 appearance-none"><option value="">اختر...</option>${f.options.map(o=>`<option value="${o}" ${val===o?'selected':''} class="bg-slate-900">${o}</option>`).join('')}</select>`;
                            } else if(f.type === 'textarea') {
                                inputHtml = `<textarea name="${f.id}" ${f.required?'required':''} rows="3" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 resize-none">${val}</textarea>`;
                            } else {
                                inputHtml = `<input name="${f.id}" value="${val}" type="${f.type}" ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'dir="ltr"' : ''} ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-base outline-none focus:border-blue-400 ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'text-left' : ''}">`;
                            }

                            return `<div class="${fullW}"><label class="block text-xs md:text-sm font-bold text-blue-100 mb-2">${f.label} ${req}</label>${inputHtml}</div>`;
                        }).join('');
                    };

                    const sections = [
                        { id: 'personal', title: 'البيانات الشخصية', icon: 'user' },
                        { id: 'contact', title: 'بيانات الاتصال', icon: 'phone' },
                        { id: 'qualifications', title: 'المؤهلات العلمية', icon: 'graduation-cap' },

                                        ${currentImage ? `<img src="${currentImage}" class="w-full h-full object-cover">` : `<i data-lucide="upload-cloud" class="w-6 h-6 md:w-8 md:h-8 mb-2"></i><span class="text-[10px] md:text-xs font-bold text-center px-2">صورة شخصية</span>`}

                employer_form() {

                    let tabContent = '';
                    
                    if (JobAppState.adminTab === 'system_admins') {
                        tabContent = `
                        <div class="glass-panel p-4 md:p-6 rounded-2xl mb-6 overflow-x-auto">
                            <h3 class="text-lg md:text-xl font-bold text-emerald-400 mb-4">المدراء الحاليين</h3>

                                ${JobAppState.systemAdmins.map(a => `
                                <div class="p-4 md:p-6 rounded-2xl border-2 flex items-start gap-3 md:gap-4 relative overflow-hidden ${a.color === 'green' ? 'bg-emerald-900/10 border-emerald-500/50' : 'bg-rose-900/10 border-rose-500/50'}">

                                    </div>
                                    <div class="flex-1 overflow-hidden">

                                        <p class="text-slate-300 text-xs md:text-sm mb-1 truncate">${a.role}</p>
                                        <p class="text-slate-400 text-[10px] md:text-xs truncate">${a.email}</p>
                                    </div>
                                    ${a.type !== 'super_admin' ? `<button onclick="JobApp.actions.removeSystemAdmin('${a.id}')" class="text-rose-500 hover:text-rose-400 p-2"><i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i></button>` : '<span class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded shrink-0">المالك</span>'}
                                </div>
                                `).join('')}
                            </div>
                        </div>

                                        <div><label class="block text-xs text-slate-300 mb-1">لون النص</label><input type="color" name="textColor" value="#ffffff" class="w-full h-10 rounded-lg cursor-pointer bg-slate-900 border border-slate-700 p-1"></div>
                                        <div><label class="block text-xs text-slate-300 mb-1">لون الخلفية</label><input type="color" name="bgColor" value="#0f172a" class="w-full h-10 rounded-lg cursor-pointer bg-slate-900 border border-slate-700 p-1"></div>
                                        <div><label class="block text-xs text-slate-300 mb-1">رقم واتساب للتواصل</label><input name="whatsapp" class="w-full px-3 py-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm outline-none text-left" dir="ltr"></div>
                                        <div><label class="block text-xs text-slate-300 mb-1">رابط زر (اختياري)</label><input name="urlLink" class="w-full px-3 py-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm outline-none text-left" dir="ltr"></div>
                                    </div>
                                    <div><label class="block text-xs text-slate-300 mb-1">نص الزر الإضافي</label><input name="urlText" placeholder="مثال: اضغط هنا" class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white text-sm outline-none"></div>
                                `}
                                <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2.5 px-6 rounded-lg text-sm w-full md:w-auto shadow-lg">نشر الإعلان</button>
                            </form>
                        </div>
                        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${JobAppState.ads.length === 0 ? '<p class="text-slate-400 col-span-full text-center py-8">لا توجد إعلانات منشورة.</p>' : ''}
                            ${JobAppState.ads.map(ad => `
                                <div class="glass-panel rounded-2xl overflow-hidden shadow-lg border border-cyan-500/20 relative group">
                                    <div class="h-32 bg-slate-900 relative">
                                        ${ad.imageUrl ? `<img src="${ad.imageUrl}" class="w-full h-full object-cover opacity-80">` : `<div class="flex items-center justify-center h-full text-slate-600"><i data-lucide="image" class="w-8 h-8"></i></div>`}
                                        <div class="absolute top-2 right-2 bg-black/70 text-white text-[10px] px-2 py-1 rounded font-bold">${ad.type === 'external' ? 'رابط' : 'صفحة'}</div>
                                    </div>
                                    <div class="p-4">
                                        <h4 class="text-white font-bold text-base truncate mb-1">${ad.title}</h4>
                                        <div class="flex justify-between items-center mt-4">
                                            <button onclick="JobApp.actions.deleteAd('${ad.id}')" class="text-rose-500 hover:text-rose-400 text-xs font-bold flex items-center gap-1"><i data-lucide="trash" class="w-3 h-3"></i> حذف الإعلان</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>`;
                    }

                    if (JobAppState.adminTab === 'messages') {
                        tabContent = `
                        <div class="grid gap-4">
                            ${JobAppState.messages.length === 0 ? '<p class="text-center p-8 text-slate-400 text-sm">صندوق الشكاوى والمقترحات فارغ.</p>' : ''}
                            ${JobAppState.messages.map(msg => `
                                <div class="glass-panel p-4 md:p-6 rounded-2xl shadow-lg border border-rose-500/20 relative">
                                    <button onclick="JobApp.actions.deleteMessage('${msg.id}')" class="absolute top-4 left-4 text-slate-500 hover:text-rose-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                    <h4 class="text-lg font-bold text-white mb-1 pr-8">${msg.subject}</h4>
                                    <div class="text-xs text-slate-400 mb-4 flex flex-wrap gap-4">
                                        <span><i data-lucide="user" class="inline w-3 h-3 mr-1"></i> ${msg.name}</span>
                                        <span dir="ltr"><i data-lucide="phone" class="inline w-3 h-3 mr-1"></i> ${msg.contact}</span>
                                        <span><i data-lucide="calendar" class="inline w-3 h-3 mr-1"></i> ${msg.date}</span>
                                    </div>
                                    <div class="bg-black/30 p-4 rounded-xl text-slate-200 text-sm whitespace-pre-wrap leading-relaxed">${msg.content}</div>
                                    <div class="mt-4 flex gap-2">
                                        <a href="tel:${msg.contact}" class="bg-white/5 hover:bg-white/10 text-white text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> اتصال بالمرسل</a>
                                        <a href="${JobApp.whatsappLink(msg.contact)}" target="_blank" class="bg-green-600/20 hover:bg-green-600/30 text-green-400 text-xs font-bold py-2 px-4 rounded-lg flex items-center gap-1"><i data-lucide="message-circle" class="w-3 h-3"></i> محادثة واتساب</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>`;
                    }

                    return `
                    <div class="w-full mx-auto px-2 md:px-4 pt-4 md:pt-8 fade-in">
                        <div class="bg-[#0f172a]/95 backdrop-blur-2xl rounded-2xl md:rounded-3xl border border-emerald-500/30 shadow-2xl overflow-hidden">
                            <div class="p-4 md:p-6 border-b border-white/10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                                <div><h2 class="text-lg md:text-2xl font-black text-emerald-400">أهلاً، ${admin.name}</h2><p class="text-slate-400 text-xs md:text-sm">لوحة الإدارة المركزية</p></div>
                                <button onclick="JobAppState.loggedInAdmin=null; JobApp.navigate('home')" class="bg-rose-500/20 text-rose-400 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-bold border border-rose-500/30 text-xs md:text-sm">خروج</button>
                            </div>
                            <div class="flex border-b border-white/10 bg-black/20 overflow-x-auto hide-scrollbar snap-x">
                                <button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='system_admins'?'text-emerald-400 border-b-2 border-emerald-400 bg-emerald-500/10':'text-slate-400 hover:text-white'}">النظام والإعدادات</button>
                                <button onclick="JobAppState.adminTab='requests'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='requests'?'text-blue-400 border-b-2 border-blue-400 bg-blue-500/10':'text-slate-400 hover:text-white'}">الطلبات</button>
                                <button onclick="JobAppState.adminTab='users'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='users'?'text-purple-400 border-b-2 border-purple-400 bg-purple-500/10':'text-slate-400 hover:text-white'}">المستخدمين والشركات</button>
                                <button onclick="JobAppState.adminTab='settings_form'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='settings_form'?'text-amber-400 border-b-2 border-amber-400 bg-amber-500/10':'text-slate-400 hover:text-white'}">إدارة حقول الاستمارة</button>
                                <button onclick="JobAppState.adminTab='ads'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='ads'?'text-cyan-400 border-b-2 border-cyan-400 bg-cyan-500/10':'text-slate-400 hover:text-white'}">مدير الإعلانات</button>
                                <button onclick="JobAppState.adminTab='messages'; JobApp.render()" class="shrink-0 snap-start px-4 md:px-6 py-3 md:py-4 font-bold text-xs md:text-sm ${JobAppState.adminTab==='messages'?'text-rose-400 border-b-2 border-rose-400 bg-rose-500/10':'text-slate-400 hover:text-white'}">الشكاوى والرسائل</button>
                            </div>
                            <div class="p-4 md:p-6 min-h-[50vh] overflow-hidden">
                                ${tabContent}
                            </div>
                        </div>
                    </div>`;
                },

                success() {
                    let pdfBtnHtml = '';
                    if (JobAppState.lastSubmittedSeeker) {
                        pdfBtnHtml = `
                        <button onclick="JobApp.actions.downloadPDF()" class="mt-4 bg-emerald-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-emerald-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">
                            <i data-lucide="download" class="w-4 h-4 md:w-5 md:h-5"></i> تحميل الاستمارة (PDF)
                        </button>
                        `;
                    }
                    return `
                    <div class="flex items-center justify-center min-h-[60vh] p-4 fade-in">
                        <div class="glass-panel p-8 md:p-12 rounded-3xl text-center max-w-lg w-full border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.2)]">
                            <i data-lucide="check-circle-2" class="w-16 h-16 md:w-20 md:h-20 text-green-400 mx-auto mb-4 md:mb-6"></i>
                            <h2 class="text-2xl md:text-3xl font-black text-white mb-4">تمت العملية بنجاح!</h2>
                            ${pdfBtnHtml}
                            <button onclick="JobApp.navigate('home')" class="mt-4 bg-blue-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-blue-500 transition-all text-sm md:text-base">العودة للرئيسية</button>
                        </div>
                    </div>`;
                }
            }
        };

        // Initialize App 
        document.addEventListener('DOMContentLoaded', () => { window.JobApp.init(); });

    </script>
</body>
</html>
