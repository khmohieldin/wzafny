<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وظفني - منصة التوظيف الذكية</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2pdf Library for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Custom Cosmic & Neon Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #050814;
            color: white;
            overflow-x: hidden;
            user-select: none; 
            -webkit-user-select: none;
        }
        
        input, textarea, select {
            user-select: text;
            -webkit-user-select: text;
        }
        
        ::-webkit-scrollbar { width: 8px; } 
        ::-webkit-scrollbar-track { background: #050814; } 
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 10px; }
        
        .stars-bg { 
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 50px 160px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 130px 80px, #ffffff, rgba(0,0,0,0)), 
                radial-gradient(2px 2px at 160px 120px, #ffffff, rgba(0,0,0,0)); 
            background-repeat: repeat; 
            background-size: 200px 200px; 
            opacity: 0.3; 
        }
        
        @keyframes neon-glow-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246, 0.4), inset 0 0 10px rgba(59,130,246, 0.2); border-color: rgba(59,130,246, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 25px rgba(168,85,247, 0.8), inset 0 0 15px rgba(168,85,247, 0.4); border-color: rgba(168,85,247, 0.8); transform: scale(1.02); }
        }
        .ad-card { animation: neon-glow-pulse 4s infinite alternate ease-in-out; }
        .ad-card:nth-child(even) { animation-delay: -2s; animation-direction: alternate-reverse; }

        .glass-panel {
            background: rgba(11, 20, 55, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* لتنسيق حقل التاريخ */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white">

    <div class="fixed inset-0 pointer-events-none z-0 stars-bg"></div>
    <div class="fixed top-[-10%] right-[-10%] w-[50rem] h-[50rem] rounded-full bg-blue-900/40 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] left-[-10%] w-[60rem] h-[60rem] rounded-full bg-purple-900/30 blur-[150px] pointer-events-none z-0"></div>

    <!-- UI Container -->
    <div id="app" class="relative z-10 min-h-screen flex flex-col"></div>

    <!-- Firebase Integration as Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, setDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC-E7BLDMOeysO8LaMwsuCF1kDbbmeQtzU",
            authDomain: "wzafny-7b4e3.firebaseapp.com",
            projectId: "wzafny-7b4e3",
            storageBucket: "wzafny-7b4e3.firebasestorage.app",
            messagingSenderId: "736863444532",
            appId: "1:736863444532:web:2a3b9881dd3fa51757b461",
            measurementId: "G-V06FDTKW19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        window.db = db;

        // Full restored default fields with required modifications
        const fullDefaultFields = [
            { id: 'f1', section: 'personal', label: 'الاسم بالكامل "ثلاثى"', type: 'text', required: true, visible: true },
            { id: 'f2', section: 'personal', label: 'عام الميلاد', type: 'number', required: true, visible: true },
            { id: 'f3', section: 'personal', label: 'الرقم القومى (14 رقم)', type: 'text', required: true, visible: true },
            { id: 'f4', section: 'personal', label: 'الحالة الاجتماعية', type: 'select', options: ['أعزب', 'متزوج', 'أخرى'], required: true, visible: true },
            { id: 'f5', section: 'personal', label: 'الموقف من التجنيد أو الخدمة العامة', type: 'select', options: ['أدى الخدمة', 'إعفاء نهائى', 'إعفاء مؤقت', 'غير مطلوب .. "للبنات فقط"'], required: true, visible: true },
            { id: 'f6', section: 'personal', label: 'الحالة الصحية', type: 'text', required: true, visible: true },
            { id: 'f7', section: 'contact', label: 'عنوان بريد إلكتروني', type: 'email', required: true, visible: true },
            { id: 'f8', section: 'contact', label: 'رقم المحمول الأساسي', type: 'tel', required: true, visible: true },
            { id: 'f9', section: 'contact', label: 'رقم محمول آخر', type: 'tel', required: true, visible: true },
            { id: 'f9_name', section: 'contact', label: 'اسم صاحب الرقم الآخر', type: 'text', required: true, visible: true },
            { id: 'f10', section: 'contact', label: 'واتساب', type: 'tel', required: true, visible: true },
            { id: 'f31', section: 'contact', label: 'رابط حساب فيسبوك (اختياري)', type: 'text', required: false, visible: true },
            { id: 'f11', section: 'contact', label: 'العنوان بالتفصيل', type: 'textarea', required: true, visible: true },
            { id: 'f12', section: 'qualifications', label: 'المؤهل', type: 'select', options: ['بدون', 'دبلوم', 'معهد', 'كلية'], required: true, visible: true },
            { id: 'f13', section: 'qualifications', label: 'المؤهل والتخصص الدقيق', type: 'text', required: true, visible: true },
            { id: 'f14', section: 'qualifications', label: 'تاريخ التخرج', type: 'date', required: true, visible: true },
            { id: 'f15', section: 'experience', label: 'الوظيفة المطلوبة', type: 'text', required: true, visible: true },
            { id: 'f16', section: 'experience', label: 'الراتب المتوقع', type: 'text', required: true, visible: true },
            { id: 'f17', section: 'experience', label: 'الوظيفة الأولى', type: 'text', required: false, visible: true },
            { id: 'f18', section: 'experience', label: 'الوظيفة الثانية', type: 'text', required: false, visible: true },
            { id: 'f19', section: 'experience', label: 'الوظيفة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f20', section: 'experience', label: 'كم عدد الوظائف السابقة', type: 'number', required: false, visible: true },
            { id: 'f21', section: 'experience', label: 'كم عاما قضيتها فى سوق العمل؟', type: 'number', required: true, visible: true },
            { id: 'f22', section: 'skills', label: 'درجة إجادة اللغة الإنجليزية؟', type: 'select', options: ['ضعيف', 'مقبول', 'جيد', 'جيد جدًا', 'ممتاز'], required: true, visible: true },
            { id: 'f23', section: 'skills', label: 'هل تجيد لغات أخرى؟', type: 'text', required: true, visible: true },
            { id: 'f24', section: 'skills', label: 'هل تجيد قيادة السيارات أو الدراجات النارية؟', type: 'select', options: ['نعم', 'لا', 'إلى حدٍ ما'], required: true, visible: true },
            { id: 'f25', section: 'skills', label: 'هل لديك رخصة قيادة؟', type: 'select', options: ['نعم', 'لا'], required: true, visible: true },
            { id: 'f26', section: 'skills', label: 'المهارة/الخبرة الأولى', type: 'text', required: false, visible: true },
            { id: 'f27', section: 'skills', label: 'المهارة/الخبرة الثانية', type: 'text', required: false, visible: true },
            { id: 'f28', section: 'skills', label: 'المهارة/الخبرة الثالثة', type: 'text', required: false, visible: true },
            { id: 'f29', section: 'skills', label: 'هل لديك أى معلومات أو مهارات ترغب فى إضافتها؟', type: 'textarea', required: true, visible: true },
            { id: 'f30', section: 'bonus', label: 'رشح أحد أصدقائك (اسمه ورقم تليفونه)', type: 'text', required: false, visible: true }
        ];

        // --- State Management ---
        window.JobAppState = {
            firebaseError: false,
            firebaseErrorMsg: '',
            view: 'home',
            siteSettings: {
                name: 'وظفني', logo: '', adminName: 'خالد محي الدين', adminRole: 'مدير الموقع', adminPhone: '6762112', adminEmail: 'khmohieldin@gmail.com', aboutUs: 'منصة وظفني هي المنصة الأولى من نوعها...', seekerPortalImg: '', employerPortalImg: ''
            },
            secretClickCount: 0,
            loggedInAdmin: null,
            adminRecoveryMode: false,
            loggedInUser: null,
            preRegData: { role: '', name: '', phone: '', email: '', password: '' }, 
            
            tempSeekerImage: '',
            tempAdImage: '',
            tempRating: 0, // لحفظ التقييم بشكل مؤقت للنجوم
            lastSubmittedSeeker: null, // لحفظ بيانات آخر شخص لطباعة الـ PDF

            adFormType: 'external',
            modals: { login: false, userLogin: false, userRecovery: false, request: false, rating: false, adDetails: false, adminRequestDetails: null, userDetails: null },
            selectedItem: null, 
            search: { term: '', location: '', exp: '' },
            adminTab: 'system_admins',
            usersSubTab: 'seekers',

            // Data Arrays
            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '6762112', password: '123456', type: 'super_admin', profileImage: '', website: 'https://khaled-tech.com', color: 'green' }],
            messages: [], 
            formFields: [...fullDefaultFields], 
            seekers: [],
            employers: [],
            requests: [],
            ads: []
        };

        // --- Global Secret Click Listener ---
        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;

            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);

            if (JobAppState.secretClickCount >= 5) {
                JobAppState.secretClickCount = 0;
                JobAppState.modals.login = true;
                JobApp.render();
            }
        });

        // --- Firebase Initial Seeder ---
        async function seedDefaults() {
            const settingsSnap = await getDocs(collection(db, 'settings'));
            if(settingsSnap.empty) {
                await setDoc(doc(db, 'settings', 'global'), JobAppState.siteSettings);
            }
            const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
            if(adminsSnap.empty) {
                await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
            }
            const fieldsSnap = await getDocs(collection(db, 'formFields'));
            if(fieldsSnap.empty || fieldsSnap.size < 15) {
                for(let f of fullDefaultFields) {
                    await setDoc(doc(db, 'formFields', f.id), f);
                }
            }
        }

        // --- Core Framework ---
        window.JobApp = {
            init: async function() {
                this.render(); 

                try {
                    if (window.location.protocol === 'file:') throw new Error("لا يمكن للأنظمة السحابية العمل من خلال ملف محلي مباشرة (file://). يرجى استخدام Live Server.");
                    
                    await signInAnonymously(auth);
                    await seedDefaults();
                    
                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})); this.render(); });

                } catch(e) {
                    console.error("Firebase Auth/Connection Error:", e);
                    JobAppState.firebaseError = true;
                    JobAppState.firebaseErrorMsg = e.message;
                    this.render(); 
                }
            },
            
            render: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;

                let currentViewHtml = '';
                if (this.views && typeof this.views[JobAppState.view] === 'function') {
                    currentViewHtml = this.views[JobAppState.view]();
                } else if (this.views && typeof this.views.home === 'function') {
                    currentViewHtml = this.views.home();
                }

                appDiv.innerHTML = `
                    ${this.components.Header()}
                    <main class="flex-grow pb-20">
                        ${currentViewHtml}
                    </main>
                    ${this.components.Modals()}
                `;
                
                if (window.lucide) { lucide.createIcons(); }
            },
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            // --- Actions ---
            actions: {
                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');
                    } else {
                        alert('بيانات الدخول غير صحيحة!');
                    }
                },
                adminRecoverySubmit(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const exists = JobAppState.systemAdmins.some(a => a.email === email);
                    if (exists) {
                        alert('تم إرسال رابط استعادة كلمة المرور إلى البريد الإلكتروني للمدير بنجاح!');
                        JobAppState.adminRecoveryMode = false;
                        JobApp.render();
                    } else {
                        alert('هذا البريد الإلكتروني غير مسجل كمدير في النظام.');
                    }
                },
                userLoginSubmit(e) {
                    e.preventDefault();
                    const phone = e.target.phone.value;
                    const pass = e.target.password.value;
                    
                    let user = JobAppState.seekers.find(s => s.phone === phone && s.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'seeker' };
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('seeker_profile');
                        return;
                    }
                    
                    user = JobAppState.employers.find(emp => emp.phone === phone && emp.password === pass);
                    if (user) {
                        JobAppState.loggedInUser = { ...user, role: 'employer' };
                        JobAppState.modals.userLogin = false;
                        JobApp.navigate('employer_profile');
                        return;
                    }
                    
                    alert('رقم الهاتف أو كلمة المرور غير صحيحة.');
                },
                userLogout() {
                    JobAppState.loggedInUser = null;
                    JobAppState.preRegData = { role: '', name: '', phone: '', email: '', password: '' };
                    JobApp.navigate('home');
                },
                userRecoverySubmit(e) {
                    e.preventDefault();
                    const contact = e.target.phone.value;
                    const existsSeeker = JobAppState.seekers.some(s => s.phone === contact || s.email === contact);
                    const existsEmp = JobAppState.employers.some(emp => emp.phone === contact || emp.email === contact);
                    
                    if (existsSeeker || existsEmp) {
                        alert('تم إرسال تعليمات استعادة كلمة المرور إلى هاتفك وبريدك بنجاح!');
                        JobAppState.modals.userRecovery = false;
                        JobAppState.modals.userLogin = true;
                        JobApp.render();
                    } else {
                        alert('عفواً، هذا الرقم أو البريد غير مسجل لدينا.');
                    }
                },
                startPreRegister(role) {
                    JobAppState.preRegData.role = role;
                    JobApp.navigate('pre_register');
                },
                async submitPreRegister(e) {
                    e.preventDefault();
                    JobAppState.preRegData.name = e.target.name.value;
                    JobAppState.preRegData.phone = e.target.phone.value;
                    JobAppState.preRegData.email = e.target.email.value;
                    JobAppState.preRegData.password = e.target.password.value;
                    
                    if (JobAppState.preRegData.role === 'seeker') {
                        JobApp.navigate('seeker_form');
                    } else {
                        const exists = JobAppState.employers.find(emp => emp.phone === JobAppState.preRegData.phone);
                        if (!exists) {
                            const newEmp = { password: JobAppState.preRegData.password, name: JobAppState.preRegData.name, profileImage: '', phone: JobAppState.preRegData.phone, email: JobAppState.preRegData.email, date: new Date().toLocaleDateString('ar-EG'), points: 0, requestsCount: 0 };
                            try {
                                const docRef = await addDoc(collection(db, 'employers'), newEmp);
                                JobAppState.loggedInUser = { id: docRef.id, ...newEmp, role: 'employer' };
                            } catch(err) {
                                alert("تم رفض التسجيل من قاعدة البيانات: " + err.message);
                                return;
                            }
                        } else {
                            JobAppState.loggedInUser = { ...exists, role: 'employer' };
                        }
                        JobApp.navigate('employer_form');
                    }
                },
                async submitSeekerForm(e) {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const data = Object.fromEntries(formData.entries());
                    
                    const newSeeker = {
                        password: JobAppState.preRegData.password,
                        name: data.f1 || JobAppState.preRegData.name,
                        age: data.f2 || 25,
                        location: data.f11 || 'غير محدد',
                        phone: data.f8 || JobAppState.preRegData.phone,
                        email: data.f7 || JobAppState.preRegData.email,
                        jobTitle: data.f15 || 'غير محدد',
                        experience: data.f21 || 0,
                        skills: [data.f26, data.f27, data.f28].filter(Boolean),
                        english: data.f22 || 'مقبول',
                        topStrengths: data.f29 || 'موظف طموح',
                        previousJobs: [data.f17, data.f18, data.f19].filter(Boolean),
                        isVisible: true,
                        rating: 0,
                        reviewsCount: 0,
                        profileImage: JobAppState.tempSeekerImage || '',
                        formData: data // حفظ كل الحقول المتبقية في الاستمارة للاستدعاء والـ PDF
                    };
                    
                    try {
                        const docRef = await addDoc(collection(db, 'seekers'), newSeeker);
                        JobAppState.loggedInUser = { id: docRef.id, ...newSeeker, role: 'seeker' };
                        JobAppState.lastSubmittedSeeker = newSeeker; // للـ PDF
                        JobAppState.tempSeekerImage = '';
                        JobApp.navigate('success');
                    } catch(err) {
                        alert("حدث خطأ أثناء حفظ الاستمارة في Firebase: " + err.message);
                    }
                },
                
                // --- PDF GENERATOR ---
                downloadPDF() {
                    const seeker = JobAppState.lastSubmittedSeeker;
                    if(!seeker) return alert("لا توجد بيانات للاستمارة الحالية.");
                    
                    let htmlContent = `
                        <div style="direction: rtl; font-family: 'Cairo', sans-serif; padding: 40px; color: #000; background: #fff;">
                            <h1 style="text-align: center; color: #1e3a8a; margin-bottom: 30px; font-weight: 900; font-size: 24px; border-bottom: 2px solid #1e3a8a; padding-bottom: 10px;">استمارة طلب وظيفة - منصة ${JobAppState.siteSettings.name}</h1>
                            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                                <tbody>
                    `;
                    
                    JobAppState.formFields.forEach(f => {
                        if(seeker.formData && seeker.formData[f.id]) {
                            htmlContent += `
                            <tr>
                                <td style="padding: 12px; border: 1px solid #cbd5e1; font-weight: bold; width: 35%; background: #f8fafc; font-size: 14px;">${f.label}</td>
                                <td style="padding: 12px; border: 1px solid #cbd5e1; width: 65%; font-size: 14px;">${seeker.formData[f.id]}</td>
                            </tr>`;
                        }
                    });
                    
                    htmlContent += `</tbody></table></div>`;
                    
                    const element = document.createElement('div');
                    element.innerHTML = htmlContent;
                    document.body.appendChild(element);
                    
                    html2pdf().from(element).set({
                        margin: 0.5,
                        filename: `استمارة_توظيف_${seeker.name.replace(/\s+/g, '_')}.pdf`,
                        image: { type: 'jpeg', quality: 1 },
                        html2canvas: { scale: 2, useCORS: true },
                        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                    }).save().then(() => {
                        document.body.removeChild(element);
                    });
                },

                async submitContactMessage(e) {
                    e.preventDefault();
                    const msg = {
                        name: e.target.name.value,
                        contact: e.target.contact.value,
                        subject: e.target.subject.value,
                        content: e.target.content.value,
                        date: new Date().toLocaleDateString('ar-EG')
                    };
                    try {
                        await addDoc(collection(db, 'messages'), msg);

                    } else {

                            name: e.target.reqName.value,
                            phone: e.target.reqPhone.value,
                            email: e.target.reqEmail.value,
                            password: e.target.reqPassword.value
                        };
                        emp = JobAppState.employers.find(x => x.phone === reqData.phone);
                        if (!emp) {
                            const newEmp = { password: reqData.password, name: reqData.name, profileImage: '', phone: reqData.phone, email: reqData.email, date: new Date().toLocaleDateString('ar-EG'), points: 0, requestsCount: 0 };
                            try {
                                const docRef = await addDoc(collection(db, 'employers'), newEmp);
                                emp = { id: docRef.id, ...newEmp };
                            } catch(err) {

                                return;
                            }
                        }
                        JobAppState.loggedInUser = { ...emp, role: 'employer' };
                    }

                    try {
                        await updateDoc(doc(db, 'employers', emp.id), { requestsCount: emp.requestsCount + 1 });
                        await addDoc(collection(db, 'requests'), {
                            employerPhone: emp.phone,
                            employer: emp, 
                            seeker: JobAppState.selectedItem, 
                            date: new Date().toLocaleDateString('ar-EG'),
                            isRated: false
                        });

                        JobAppState.modals.request = false;
                        alert('تم إرسال طلبك للإدارة للتواصل مع الكفاءة بنجاح!');
                        JobApp.render();
                    } catch(err) {
                        alert("خطأ أثناء حفظ الطلب: " + err.message);
                    }
                },
                openRatingModal(reqId) {
                    JobAppState.selectedItem = JobAppState.requests.find(r => r.id === reqId);
                    JobAppState.tempRating = 0; // تصفير النجوم
                    JobAppState.modals.rating = true;
                    JobApp.render();
                },
                setTempRating(val) {
                    JobAppState.tempRating = val;
                    JobApp.render();
                },
                async submitRating(e) {
                    e.preventDefault();
                    const stars = JobAppState.tempRating;
                    const feedback = e.target.feedback.value;
                    
                    if(stars < 1 || stars > 5) return alert("يرجى اختيار التقييم بالنجوم أولاً");
                    if(!feedback.trim()) return alert("يرجى كتابة تعليق يوضح سبب التقييم (إجباري)");
                    
                    const req = JobAppState.selectedItem;
                    const emp = JobAppState.employers.find(x => x.phone === req.employerPhone);
                    const seeker = JobAppState.seekers.find(s => s.id === req.seeker.id);

                    try {
                        await updateDoc(doc(db, 'requests', req.id), { isRated: true, ratingGiven: stars, ratingFeedback: feedback });
                        
                        if(emp) {
                            await updateDoc(doc(db, 'employers', emp.id), { points: emp.points + 5 });
                        }
                        
                        if(seeker) {
                            const newCount = seeker.reviewsCount + 1;
                            const newRating = Number((((seeker.rating * seeker.reviewsCount) + stars) / newCount).toFixed(1));
                            await updateDoc(doc(db, 'seekers', seeker.id), { reviewsCount: newCount, rating: newRating });
                        }

                        JobAppState.modals.rating = false;
                        alert('تم التقييم بنجاح! تم إضافة 5 نقاط إلى محفظتك 🎁');
                        JobApp.render();
                    } catch(err) {
                        alert("خطأ أثناء تسجيل التقييم: " + err.message);
                    }
                },
                uploadImage(inputElement, callbackKey) {
                    const file = inputElement.files[0];
                    if(!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = event => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 600;
                            let width = img.width;
                            let height = img.height;
                            if (width > MAX_WIDTH) { height = height * (MAX_WIDTH / width); width = MAX_WIDTH; }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 

                            if(callbackKey === 'siteLogo') { JobAppState.siteSettings.logo = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'seekerPortalImg') { JobAppState.siteSettings.seekerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerPortalImg') { JobAppState.siteSettings.employerPortalImg = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempSeekerImage') { JobAppState.tempSeekerImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'tempAdImage') { JobAppState.tempAdImage = compressedBase64; JobApp.render(); }
                            else if(callbackKey === 'employerProfileImage') {
                                const emp = JobAppState.employers.find(e => e.phone === JobAppState.loggedInUser.phone);
                                if(emp) {
                                    try {
                                        updateDoc(doc(db, 'employers', emp.id), { profileImage: compressedBase64 });
                                    } catch(err) { alert("حدث خطأ في تحديث الصورة: " + err.message); }
                                }
                                JobAppState.loggedInUser.profileImage = compressedBase64;
                                JobApp.render();
                            }
                        }
                    }
                    reader.readAsDataURL(file);
                },
                
                async deletePortalImage(type) {
                    if(type === 'seeker') JobAppState.siteSettings.seekerPortalImg = '';
                    if(type === 'employer') JobAppState.siteSettings.employerPortalImg = '';

                seeker_form() {
                    const getFieldsHTML = (section) => {
                        const fields = JobAppState.formFields.filter(f => f.section === section && f.visible);
                        if(fields.length === 0) return '';
                        return fields.map(f => {
                            const req = f.required ? '<span class="text-rose-400">*</span>' : '';
                            const fullW = f.type === 'textarea' || f.label.length > 50 ? 'md:col-span-2' : '';
                            
                            let val = '';
                            if(f.label.includes('الاسم')) val = JobAppState.preRegData.name;
                            if(f.type === 'email') val = JobAppState.preRegData.email;
                            if(f.type === 'tel' && f.id === 'f8') val = JobAppState.preRegData.phone;

                            let inputHtml = '';
                            
                            // إجبار إدخال 14 رقم فقط للرقم القومي
                            if (f.id === 'f3') {
                                inputHtml = `<input name="${f.id}" value="${val}" type="text" dir="ltr" required pattern="\\d{14}" maxlength="14" minlength="14" title="يجب إدخال 14 رقم فقط" oninput="this.value=this.value.replace(/[^0-9]/g,'');" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white outline-none focus:border-blue-400 text-left">`;
                            }
                            else if(f.type === 'select') {
                                inputHtml = `<select name="${f.id}" ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white outline-none focus:border-blue-400 appearance-none"><option value="">اختر...</option>${f.options.map(o=>`<option value="${o}" class="bg-slate-900">${o}</option>`).join('')}</select>`;
                            } else if(f.type === 'textarea') {
                                inputHtml = `<textarea name="${f.id}" ${f.required?'required':''} rows="3" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white outline-none focus:border-blue-400 resize-none"></textarea>`;
                            } else {
                                inputHtml = `<input name="${f.id}" value="${val}" type="${f.type}" ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'dir="ltr"' : ''} ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white outline-none focus:border-blue-400 ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'text-left' : ''}">`;
                            }

                            return `<div class="${fullW}"><label class="block text-sm font-bold text-blue-100 mb-2">${f.label} ${req}</label>${inputHtml}</div>`;
                        }).join('');
                    };

                    const sections = [
                        { id: 'personal', title: 'البيانات الشخصية', icon: 'user' },
                        { id: 'contact', title: 'بيانات الاتصال', icon: 'phone' },

                        { id: 'skills', title: 'المهارات', icon: 'star' },

                        return `

                                    إرسال وتفعيل الاستمارة
                                </button>

                seeker_profile() {
                    const user = JobAppState.loggedInUser;
                    if(!user || user.role !== 'seeker') return '<div class="text-center p-20 text-red-500">غير مصرح بالدخول</div>';
                    
                    return `

                        <div class="glass-panel p-10 rounded-3xl text-center shadow-[0_0_50px_rgba(59,130,246,0.1)] relative overflow-hidden">

                                    </div>
                                `}
                                
                                <div class="md:col-span-2 flex justify-end mt-4"><button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-3 px-8 rounded-lg transition-all flex items-center gap-2 shadow-lg">حفظ ونشر الإعلان <i data-lucide="plus" class="w-5 h-5"></i></button></div>
                            </form>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-4">الإعلانات والمقالات الحالية</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            ${JobAppState.ads.length === 0 ? '<p class="text-slate-400 p-4">لا توجد إعلانات نشطة.</p>' : ''}
                            ${JobAppState.ads.map(ad => `
                            <div class="flex items-center gap-4 bg-white/5 border border-white/10 p-3 rounded-2xl hover:bg-white/10 transition-colors">
                                <div class="w-20 h-20 bg-slate-900 rounded-xl overflow-hidden shrink-0 border border-white/5">
                                    ${ad.imageUrl ? `<img src="${ad.imageUrl}" class="w-full h-full object-cover opacity-80">` : `<i data-lucide="image" class="w-full h-full p-4 text-white/20"></i>`}
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <h4 class="text-white font-bold truncate">${ad.title}</h4>
                                    <p class="text-xs text-amber-400 font-bold mb-1">${ad.type === 'internal' ? 'مقال/صفحة داخلية' : 'رابط مباشر'}</p>
                                    ${ad.link ? `<a href="${ad.link}" target="_blank" class="text-xs text-blue-400 hover:underline flex items-center gap-1"><i data-lucide="external-link" class="w-3 h-3"></i> الرابط</a>` : ''}
                                </div>
                                <button onclick="JobApp.actions.deleteAd('${ad.id}')" class="p-3 bg-rose-900/30 hover:bg-rose-600 rounded-xl text-rose-400 hover:text-white transition-colors border border-rose-500/20 shrink-0">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                            `).join('')}
                        </div>`;
                    }

                    if (JobAppState.adminTab === 'settings_form') {
                        tabContent = `
                        <div class="bg-slate-800/50 border border-slate-700 p-6 rounded-2xl mb-8 shadow-inner">
                            <h3 class="text-xl font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="plus" class="w-5 h-5 text-blue-400"></i> إضافة حقل جديد للاستمارة</h3>
                            <form onsubmit="JobApp.actions.handleAddNewField(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                                <div><label class="block text-sm text-slate-300 mb-1">اسم السؤال</label><input name="label" required class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none"></div>
                                <div>
                                    <label class="block text-sm text-slate-300 mb-1">القسم</label>
                                    <select name="section" class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none">
                                        <option value="personal">البيانات الشخصية</option><option value="contact">بيانات الاتصال</option><option value="qualifications">المؤهلات العلمية</option>
                                        <option value="experience">الوظائف والخبرة</option><option value="skills">المهارات</option><option value="bonus">معلومات إضافية</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm text-slate-300 mb-1">نوع الإجابة</label>
                                    <select name="type" class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none">
                                        <option value="text">نص قصير</option><option value="number">أرقام</option><option value="email">بريد إلكتروني</option>
                                        <option value="tel">رقم هاتف</option><option value="date">تاريخ</option><option value="textarea">نص طويل</option><option value="select">قائمة منسدلة</option>
                                    </select>
                                </div>
                                <div class="flex gap-4 items-center">
                                    <label class="flex items-center gap-2 text-white cursor-pointer"><input name="required" type="checkbox" class="w-4 h-4 accent-blue-500"> إجباري</label>
                                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg ml-auto">إضافة</button>
                                </div>
                                <div class="md:col-span-4 mt-2">
                                    <label class="block text-sm text-amber-400 mb-1">خيارات (فقط للقائمة المنسدلة - مفصولة بفاصلة)</label>
                                    <input name="optionsString" type="text" class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-amber-500/50 text-white outline-none">
                                </div>
                            </form>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-4">إدارة الأسئلة الحالية</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            ${JobAppState.formFields.map(field => `
                            <div class="flex items-center justify-between p-4 rounded-xl border transition-all ${field.visible ? 'bg-white/5 border-white/10' : 'bg-rose-900/10 border-rose-500/20 opacity-60'}">
                                <div>
                                    <div class="font-bold text-white flex items-center gap-2">${field.label} ${field.required ? '<span class="text-rose-400">*</span>' : ''}</div>
                                    <div class="text-xs text-slate-400 mt-1"><span class="bg-slate-800 px-2 py-0.5 rounded">القسم: ${field.section}</span></div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="JobApp.actions.toggleFieldVisibility('${field.id}')" class="p-2 rounded-lg text-white border ${field.visible ? 'bg-slate-800 border-slate-600' : 'bg-emerald-900/50 text-emerald-400'}"><i data-lucide="${field.visible ? 'eye-off' : 'eye'}"></i></button>
                                    <button onclick="JobApp.actions.deleteField('${field.id}')" class="p-2 bg-rose-900/30 rounded-lg text-rose-400"><i data-lucide="trash-2"></i></button>
                                </div>
                            </div>
                            `).join('')}
                        </div>`;
                    }

                    if (JobAppState.adminTab === 'users') {
                        let usersList = '';
                        if(JobAppState.usersSubTab === 'seekers') {
                            usersList = JobAppState.seekers.map(s => `
                            <div class="flex flex-col md:flex-row md:items-center justify-between bg-slate-800/40 p-4 rounded-2xl border border-slate-700 hover:border-blue-500/50 gap-4 mb-3">
                                <div class="flex items-center gap-4">
                                    ${s.profileImage ? `<img src="${s.profileImage}" class="w-12 h-12 rounded-full object-cover border border-blue-500/50">` : `<div class="bg-blue-500/20 p-3 rounded-full text-blue-400"><i data-lucide="user"></i></div>`}
                                    <div>
                                        <h4 class="text-white font-bold text-lg">${s.name} ${s.isVisible?'<span class="text-[10px] text-emerald-400">مرئي</span>':'<span class="text-[10px] text-slate-400">مخفي</span>'}</h4>
                                        <p class="text-blue-300 text-sm">${s.jobTitle}</p>
                                    </div>
                                </div>
                                <div class="flex gap-2 shrink-0">
                                    <button onclick="JobApp.actions.toggleSeekerVisibility('${s.id}')" class="p-2.5 bg-slate-700 hover:bg-slate-600 rounded-xl text-slate-300"><i data-lucide="${s.isVisible?'eye-off':'eye'}"></i></button>
                                    <button onclick="JobApp.actions.openUserDetails('seeker', '${s.id}')" class="bg-blue-600/20 text-blue-400 py-2 px-4 rounded-xl font-bold text-sm">تفاصيل</button>
                                    <button onclick="JobApp.actions.deleteSeeker('${s.id}')" class="p-2.5 bg-rose-500/10 text-rose-400 rounded-xl"><i data-lucide="trash-2"></i></button>
                                </div>
                            </div>`).join('');
                        } else {
                            usersList = JobAppState.employers.map(emp => `
                            <div class="flex flex-col md:flex-row md:items-center justify-between bg-slate-800/40 p-4 rounded-2xl border border-slate-700 hover:border-purple-500/50 gap-4 mb-3">
                                <div class="flex items-center gap-4">
                                    ${emp.profileImage ? `<img src="${emp.profileImage}" class="w-12 h-12 rounded-full object-cover border border-purple-500/50">` : `<div class="bg-purple-500/20 p-3 rounded-full text-purple-400"><i data-lucide="building-2"></i></div>`}
                                    <div>
                                        <h4 class="text-white font-bold text-lg">${emp.name}</h4>
                                        <p class="text-purple-300 text-sm">النقاط: ${emp.points} | الطلبات: ${emp.requestsCount}</p>
                                    </div>
                                </div>
                                <div class="flex gap-2 shrink-0">
                                    <button onclick="JobApp.actions.openUserDetails('employer', '${emp.id}')" class="bg-purple-600/20 text-purple-400 py-2 px-4 rounded-xl font-bold text-sm">تفاصيل</button>
                                    <button onclick="JobApp.actions.deleteEmployer('${emp.id}')" class="p-2.5 bg-rose-500/10 text-rose-400 rounded-xl"><i data-lucide="trash-2"></i></button>
                                </div>
                            </div>`).join('');
                        }

                        tabContent = `
                        <div class="flex gap-4 mb-6">
                            <button onclick="JobAppState.usersSubTab='seekers'; JobApp.render()" class="flex-1 py-3 rounded-xl font-bold border ${JobAppState.usersSubTab==='seekers'?'bg-blue-600 border-blue-500 text-white':'bg-slate-800 border-slate-700 text-slate-400'}">طالبي الوظائف (${JobAppState.seekers.length})</button>
                            <button onclick="JobAppState.usersSubTab='employers'; JobApp.render()" class="flex-1 py-3 rounded-xl font-bold border ${JobAppState.usersSubTab==='employers'?'bg-purple-600 border-purple-500 text-white':'bg-slate-800 border-slate-700 text-slate-400'}">الشركات (${JobAppState.employers.length})</button>
                        </div>
                        <div>${usersList}</div>`;
                    }

                    if (JobAppState.adminTab === 'requests') {
                        tabContent = `
                        <div class="grid gap-4">
                            ${JobAppState.requests.length === 0 ? '<p class="text-center p-8 text-slate-400">لا توجد طلبات توظيف حتى الآن.</p>' : ''}
                            ${JobAppState.requests.map(req => `
                            <div class="glass-panel p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6 shadow-lg">
                                <div class="flex-1 flex items-center gap-4">
                                    ${req.employer.profileImage ? `<img src="${req.employer.profileImage}" class="w-12 h-12 rounded-full object-cover border border-purple-500/30">` : `<div class="w-12 h-12 rounded-full bg-purple-500/10 border border-purple-500/30 flex items-center justify-center"><i data-lucide="building-2" class="text-purple-400"></i></div>`}
                                    <div>
                                        <div class="text-white font-black text-xl">${req.employer.name}</div>
                                        <div class="text-sm text-slate-300"><a href="${JobApp.whatsappLink(req.employerPhone)}" target="_blank" class="hover:text-green-400" dir="ltr">${req.employerPhone}</a></div>
                                    </div>
                                </div>
                                <div class="hidden md:flex text-slate-500"><i data-lucide="arrow-left"></i></div>
                                <div class="flex-1 flex items-center gap-4">
                                    ${req.seeker.profileImage ? `<img src="${req.seeker.profileImage}" class="w-12 h-12 rounded-full object-cover border border-blue-500/30">` : `<div class="w-12 h-12 rounded-full bg-blue-500/10 border border-blue-500/30 flex items-center justify-center"><i data-lucide="user" class="text-blue-400"></i></div>`}
                                    <div>
                                        <div class="text-white font-black text-xl">${req.seeker.name}</div>
                                        <div class="text-sm text-slate-300">${req.seeker.jobTitle}</div>
                                    </div>
                                </div>
                                <div>
                                    <button onclick="JobApp.actions.openAdminRequestDetails('${req.id}')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg flex items-center gap-2"><i data-lucide="info" class="w-4 h-4"></i> التفاصيل</button>
                                </div>
                            </div>
                            `).join('')}
                        </div>`;
                    }

                    if (JobAppState.adminTab === 'messages') {
                        tabContent = `
                        <div class="grid gap-4">
                            ${JobAppState.messages.length === 0 ? '<p class="text-center p-8 text-slate-400">لا يوجد رسائل أو شكاوى حالياً.</p>' : ''}
                            ${JobAppState.messages.map(msg => `
                            <div class="bg-slate-800/60 border border-slate-700 p-6 rounded-2xl relative">
                                <button onclick="JobApp.actions.deleteMessage('${msg.id}')" class="absolute top-4 left-4 text-rose-500 hover:text-rose-400"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                <h3 class="text-xl font-bold text-white mb-1">${msg.subject}</h3>
                                <p class="text-xs text-slate-400 mb-4">بواسطة: <span class="font-bold text-blue-300">${msg.name}</span> | التواصل: <span class="text-emerald-400" dir="ltr">${msg.contact}</span> | التاريخ: ${msg.date}</p>
                                <div class="bg-black/30 p-4 rounded-xl text-slate-200 leading-relaxed whitespace-pre-wrap">${msg.content}</div>
                            </div>
                            `).join('')}
                        </div>`;
                    }

                    return `
                    <div class="max-w-7xl mx-auto px-4 pt-8 fade-in">
                        <div class="bg-[#0f172a]/90 backdrop-blur-2xl rounded-3xl border border-emerald-500/30 shadow-2xl overflow-hidden">
                            <div class="p-6 border-b border-white/10 flex justify-between items-center flex-wrap gap-4">
                                <div><h2 class="text-2xl font-black text-emerald-400">أهلاً، ${admin.name}</h2><p class="text-slate-400 text-sm">لوحة الإدارة المركزية</p></div>
                                <button onclick="JobAppState.loggedInAdmin=null; JobApp.navigate('home')" class="bg-rose-500/20 text-rose-400 px-4 py-2 rounded-lg font-bold border border-rose-500/30">خروج الإدارة</button>
                            </div>
                            <div class="flex border-b border-white/10 bg-black/20 overflow-x-auto">
                                <button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap ${JobAppState.adminTab==='system_admins'?'text-emerald-400 border-b-2 border-emerald-400 bg-emerald-500/10':'text-slate-400 hover:text-white'}">إعدادات النظام</button>
                                <button onclick="JobAppState.adminTab='ads'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap ${JobAppState.adminTab==='ads'?'text-amber-400 border-b-2 border-amber-400 bg-amber-500/10':'text-slate-400 hover:text-white'}">الإعلانات والمقالات</button>
                                <button onclick="JobAppState.adminTab='settings_form'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap ${JobAppState.adminTab==='settings_form'?'text-blue-400 border-b-2 border-blue-400 bg-blue-500/10':'text-slate-400 hover:text-white'}">باني الاستمارات</button>
                                <button onclick="JobAppState.adminTab='users'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap ${JobAppState.adminTab==='users'?'text-blue-400 border-b-2 border-blue-400 bg-blue-500/10':'text-slate-400 hover:text-white'}">قاعدة المسجلين</button>
                                <button onclick="JobAppState.adminTab='requests'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap ${JobAppState.adminTab==='requests'?'text-blue-400 border-b-2 border-blue-400 bg-blue-500/10':'text-slate-400 hover:text-white'}">طلبات التوظيف</button>
                                <button onclick="JobAppState.adminTab='messages'; JobApp.render()" class="px-6 py-4 font-bold whitespace-nowrap flex items-center gap-1 ${JobAppState.adminTab==='messages'?'text-rose-400 border-b-2 border-rose-400 bg-rose-500/10':'text-slate-400 hover:text-white'}">رسائل الزوار ${JobAppState.messages.length>0?`<span class="bg-rose-500 text-white text-[10px] px-1.5 rounded-full">${JobAppState.messages.length}</span>`:''}</button>
                            </div>
                            <div class="p-6 min-h-[50vh]">
                                ${tabContent}
                            </div>
                        </div>
                    </div>`;
                },

                success() {
                    let pdfBtnHtml = '';
                    if (JobAppState.lastSubmittedSeeker) {
                        pdfBtnHtml = `
                        <button onclick="JobApp.actions.downloadPDF()" class="mt-4 bg-emerald-600 text-white font-bold px-8 py-4 rounded-xl w-full hover:bg-emerald-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1">
                            <i data-lucide="download" class="w-5 h-5"></i> تحميل الاستمارة (PDF)
                        </button>
                        `;
                    }
                    return `
                    <div class="flex items-center justify-center min-h-[60vh] p-4 fade-in">
                        <div class="glass-panel p-12 rounded-3xl text-center max-w-lg w-full border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.2)]">
                            <i data-lucide="check-circle-2" class="w-20 h-20 text-green-400 mx-auto mb-6"></i>
                            <h2 class="text-3xl font-black text-white mb-4">تمت العملية بنجاح!</h2>
                            ${pdfBtnHtml}
                            <button onclick="JobApp.navigate('home')" class="mt-4 bg-blue-600 text-white font-bold px-8 py-4 rounded-xl w-full hover:bg-blue-500 transition-all">العودة للرئيسية</button>
                        </div>
                    </div>`;
                }
            }
        };

        // Initialize App 
        document.addEventListener('DOMContentLoaded', () => { window.JobApp.init(); });

    </script>
</body>
</html>
