        const saveLocal = (col, data) => { 
            if(JobAppState.isOffline) localStorage.setItem('wzafny_' + col, JSON.stringify(data)); 
        };

        // --- State Management ---
        window.JobAppState = {
            isOffline: false, 
            view: 'home',
            authMode: 'login', 
            
            siteSettings: {
                name: 'منصة توظيف المصرية لخدمات الموارد البشرية وظفنى.كوم _ wzfny.com', 
                logo: '', adminName: 'خالد محي الدين', adminRole: 'مدير الموقع', adminPhone: '01144800777', adminEmail: 'khmohieldin@gmail.com', aboutUs: 'منصة وظفني هي المنصة الأولى من نوعها...', seekerPortalImg: '', employerPortalImg: '', tickerEnabled: true, tickerSpeed: 30, tickerMode: 'auto', tickerManualText: '', visitorsCount: 1500

            secretClickCount: 0, loggedInAdmin: null, adminRecoveryMode: false, loggedInUser: null, preRegData: { role: 'seeker' },

            systemAdmins: [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' }],
            messages: [], formFields: [...fullDefaultFields], seekers: [], employers: [], requests: [], ads: []
        };

        window.secretClickTimer = null;
        document.addEventListener('click', function(e) {
            if (JobAppState.modals.login || JobAppState.loggedInAdmin) return;
            const isInteractive = e.target.closest('button, a, input, select, textarea, label, [onclick]');
            if (isInteractive) return;
            JobAppState.secretClickCount++;
            clearTimeout(window.secretClickTimer);
            window.secretClickTimer = setTimeout(function() { JobAppState.secretClickCount = 0; }, 3000);
            if (JobAppState.secretClickCount >= 5) { JobAppState.secretClickCount = 0; JobAppState.modals.login = true; JobApp.render(); }
        });

        window.fetchMarketNews = async function() {
            const el = document.getElementById('dynamic-ticker-text');
            if(!el) return;
            const today = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const fallbackNews = `📅 تحديث اليوم: ${today} &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 📈 نمو ملحوظ في قطاعات التكنولوجيا والمبيعات في السوق المصري &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 💡 نصيحة مهنية: تطوير مهارات التواصل (Soft Skills) يضاعف من فرص قبولك بنسبة 70% &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 📊 الشركات الناشئة توفر فرص عمل مرنة وتنافسية للكفاءات الشابة &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 🎯 كتابة سيرة ذاتية واضحة ومختصرة هي بوابتك الأولى للوصول للمقابلة الشخصية`;

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);
                const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=وظائف+OR+سوق+العمل+مصر&hl=ar&gl=EG&ceid=EG:ar');
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await res.json();
                if(data && data.items && data.items.length > 0) {
                    const headlines = data.items.slice(0, 10).map(item => item.title);
                    el.innerHTML = `📅 تحديث اليوم: ${today} &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; ` + headlines.join(' &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; ');
                } else {
                    el.innerHTML = fallbackNews;
                }
            } catch(e) {
                el.innerHTML = fallbackNews;
            }
        };

        // --- Firebase Initial Seeder ---
        async function seedDefaultsAndCount() {
            if (isFileProtocol || !db) return;
            try {
                const settingsRef = doc(db, 'settings', 'global');
                const settingsSnap = await getDoc(settingsRef);
                
                if(!settingsSnap.exists()) {
                    await setDoc(settingsRef, JobAppState.siteSettings);
                } else {
                    await updateDoc(settingsRef, { visitorsCount: increment(1) });
                }

                const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                if(adminsSnap.empty) {
                    await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
                }
                const fieldsSnap = await getDocs(collection(db, 'formFields'));
                if(fieldsSnap.empty || fieldsSnap.size < 15) {
                    for(let f of fullDefaultFields) {
                        await setDoc(doc(db, 'formFields', f.id), f);
                    }
                }
            } catch (e) { console.log("Seeding skipped", e); }
        }

        // --- Core Framework ---
        window.JobApp = {
            renderTimer: null,
            init: async function() {
                try {
                    this.syncSession(); 
                    this.render(); 

                    if (isFileProtocol) throw new Error("PROTOCOL_ERROR");

                    const fbInitTask = async () => {
                        await signInAnonymously(auth);
                        const settingsRef = doc(db, 'settings', 'global');
                        const settingsSnap = await getDoc(settingsRef);
                        if(!settingsSnap.exists()) await setDoc(settingsRef, JobAppState.siteSettings);
                        else await updateDoc(settingsRef, { visitorsCount: increment(1) });

                        const adminsSnap = await getDocs(collection(db, 'systemAdmins'));
                        if(adminsSnap.empty) await addDoc(collection(db, 'systemAdmins'), JobAppState.systemAdmins[0]);
                        
                        const fieldsSnap = await getDocs(collection(db, 'formFields'));
                        if(fieldsSnap.empty || fieldsSnap.size < 15) {
                            for(let f of fullDefaultFields) await setDoc(doc(db, 'formFields', f.id), f);
                        }
                    };

                    const timeoutTask = new Promise((_, reject) => setTimeout(() => reject(new Error("TIMEOUT")), 4000));
                    
                    await Promise.race([fbInitTask(), timeoutTask]);

                    onSnapshot(doc(db, 'settings', 'global'), doc => { if(doc.exists()) { JobAppState.siteSettings = doc.data(); this.syncSession(); this.render(); }});
                    onSnapshot(collection(db, 'systemAdmins'), snap => { JobAppState.systemAdmins = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'formFields'), snap => { JobAppState.formFields = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => parseInt(a.id.replace('f', '')) - parseInt(b.id.replace('f', ''))); this.render(); });
                    onSnapshot(collection(db, 'seekers'), snap => { JobAppState.seekers = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.rating - a.rating); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'employers'), snap => { JobAppState.employers = snap.docs.map(d => ({id: d.id, ...d.data()})); this.syncSession(); this.render(); });
                    onSnapshot(collection(db, 'requests'), snap => { JobAppState.requests = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'ads'), snap => { JobAppState.ads = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });
                    onSnapshot(collection(db, 'messages'), snap => { JobAppState.messages = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>b.id - a.id); this.render(); });

                } catch(e) {
                    console.warn("تم تفعيل وضع التخزين المحلي (Offline Mode).");
                    JobAppState.isOffline = true;
                    JobAppState.siteSettings.visitorsCount++; 
                    
                    ['seekers', 'employers', 'requests', 'ads', 'messages', 'systemAdmins', 'formFields'].forEach(col => {
                        const stored = localStorage.getItem('wzafny_' + col);
                        if(stored) {
                            try {
                                JobAppState[col] = JSON.parse(stored);
                            } catch(err) {
                                console.error("Error parsing local storage for " + col);
                            }
                        }
                    });
                    
                    if (JobAppState.formFields.length === 0) JobAppState.formFields = [...fullDefaultFields];
                    if (JobAppState.systemAdmins.length === 0) JobAppState.systemAdmins = [{ id: 'admin_owner', name: 'خالد محي الدين', role: 'الدعم الفنى (المالك)', email: 'khmohieldin@gmail.com', phone: '01144800777', password: '123456', type: 'super_admin', profileImage: '', color: 'green' }];
                    
                    this.syncSession(); 
                    this.render(); 
                }
            },
            
            syncSession: function() {
                if (JobAppState.loggedInUser) {
                    if (JobAppState.loggedInUser.role === 'seeker') {
                        const updated = JobAppState.seekers.find(s => s.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'seeker' };
                    } else if (JobAppState.loggedInUser.role === 'employer') {
                        const updated = JobAppState.employers.find(e => e.id === JobAppState.loggedInUser.id);
                        if (updated) JobAppState.loggedInUser = { ...updated, role: 'employer' };
                    }
                } else {
                    const uAuth = localStorage.getItem('wzafny_user');
                    if (uAuth) {
                        try {
                            const { id, role } = JSON.parse(uAuth);
                            if (role === 'seeker') {
                                const s = JobAppState.seekers.find(x => x.id === id);
                                if (s) JobAppState.loggedInUser = { ...s, role };
                            } else if (role === 'employer') {
                                const e = JobAppState.employers.find(x => x.id === id);
                                if (e) JobAppState.loggedInUser = { ...e, role };
                            }
                        } catch(e) {}
                    }
                }

                if (JobAppState.loggedInAdmin) {
                    const updated = JobAppState.systemAdmins.find(a => a.id === JobAppState.loggedInAdmin.id);
                    if(updated) JobAppState.loggedInAdmin = updated;
                } else {
                    const aAuth = localStorage.getItem('wzafny_admin');
                    if (aAuth) {
                        try {
                            const { email, pass } = JSON.parse(aAuth);
                            const a = JobAppState.systemAdmins.find(x => x.email === email && x.password === pass);
                            if (a) JobAppState.loggedInAdmin = a;
                        } catch(e) {}
                    }
                }
            },

            render: function() {
                if (this.renderTimer) clearTimeout(this.renderTimer);
                this.renderTimer = setTimeout(() => this._doRender(), 50);
            },

            _doRender: function() {
                const appDiv = document.getElementById('app');
                if (!appDiv) return;
                let currentViewHtml = this.views[JobAppState.view] ? this.views[JobAppState.view]() : this.views.home();
                appDiv.innerHTML = `${this.components.Header()}<main class="flex-grow pb-20 w-full overflow-x-hidden">${currentViewHtml}</main>${this.components.Modals()}`;
                if (window.lucide) { lucide.createIcons(); }
            },
            
            navigate: function(view) {
                JobAppState.view = view;
                this.render();
                window.scrollTo(0, 0);
            },
            
            whatsappLink: function(phone) {
                if (!phone) return '#';
                let f = phone.replace(/\D/g, '');
                if (f.startsWith('01')) f = '2' + f;
                return `https://wa.me/${f}`;
            },

            actions: {
                viewImage(imgSrc) {
                    JobAppState.modals.imageViewer = imgSrc;
                    JobApp.render();
                },
                closeImageViewer() {
                    JobAppState.modals.imageViewer = null;
                    JobApp.render();
                },
                downloadImage(imgSrc) {
                    const a = document.createElement('a');
                    a.href = imgSrc;
                    a.download = 'صورة_مرفقة.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                },
                adminLogin(e) {
                    e.preventDefault();
                    const email = e.target.email.value;
                    const pass = e.target.password.value;
                    const admin = JobAppState.systemAdmins.find(a => a.email === email && a.password === pass);
                    if (admin) {
                        JobAppState.loggedInAdmin = admin;
                        localStorage.setItem('wzafny_admin', JSON.stringify({ email: admin.email, pass: admin.password })); 
                        JobAppState.modals.login = false;
                        JobAppState.adminRecoveryMode = false;
                        JobApp.navigate('admin_dashboard');

                            canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);

                            else if(callbackKey === 'seekerPortalImg') { JobAppState.siteSettings.seekerPortalImg = compressedBase64; JobApp.render(); }

                    const headers = rows[0].split(',').map(h => h.trim());
                    
                    const map = {
                        name: headers.findIndex(h => h.includes('اسم') || h.includes('Name')),
                        email: headers.findIndex(h => h.includes('بريد') || h.includes('ايميل') || h.includes('Email')),
                        password: headers.findIndex(h => h.includes('سر') || h.includes('مرور') || h.includes('Password')),
                        jobTitle: headers.findIndex(h => h.includes('وظيف') || h.includes('Job')),
                        phone: headers.findIndex(h => h.includes('هاتف') || h.includes('تليفون') || h.includes('محمول') || h.includes('Phone')),
                        experience: headers.findIndex(h => h.includes('خبر') || h.includes('Experience'))
                    };

                    let fieldMap = {};
                    JobAppState.formFields.forEach(f => {
                        const idx = headers.findIndex(h => h === f.label || h.includes(f.label) || f.label.includes(h));
                        if (idx > -1) fieldMap[idx] = f.id;
                    });

                    let added = 0;
                    for(let i = 1; i < rows.length; i++) {
                        const cols = rows[i].split(',').map(c => c.trim());
                        if(cols.length >= 2) {
                            const name = map.name > -1 && cols[map.name] ? cols[map.name] : 'بدون اسم';
                            const email = map.email > -1 && cols[map.email] ? cols[map.email] : `user${Date.now()}${i}@wzfny.com`;

                            const experience = map.experience > -1 && cols[map.experience] ? parseInt(cols[map.experience]) || 0 : 0;

                            let formData = {};
                            for (let c = 0; c < cols.length; c++) {
                                if (fieldMap[c]) {
                                    formData[fieldMap[c]] = cols[c];
                                }
                            }

                            const newSeeker = { 
                                name, email, password, jobTitle, phone, experience, 
                                skills: [], isVisible: true, isHired: false, rating: 0, reviewsCount: 0, profileImage: '', 
                                formData: formData 
                            };

                            if (!JobAppState.isOffline) {
                                await addDoc(collection(db, 'seekers'), newSeeker);
                            } else { 
                                newSeeker.id = Date.now().toString() + Math.random(); 
                                JobAppState.seekers.unshift(newSeeker); 
                                saveLocal('seekers', JobAppState.seekers); 
                            }
                            added++;
                        }
                    }

                    JobAppState.modals.bulkAdd = false; 
                    JobApp.render();

                    }
                    if (JobAppState.modals.editAdmin) {
                        const admin = JobAppState.modals.editAdmin;
                        html += `
                        <div class="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm fade-in">
                            <div class="bg-slate-900 border border-emerald-500/50 p-4 sm:p-6 md:p-8 rounded-3xl shadow-2xl max-w-lg w-[95%] sm:w-full relative max-h-[90vh] overflow-y-auto hide-scrollbar">

            views: {

                    } 
                    else if (mode === 'register') {
                        return `<div class="flex items-center justify-center py-8 sm:py-12 px-4 fade-in"><div class="max-w-md w-full glass-panel rounded-3xl p-6 sm:p-8 shadow-lg relative overflow-hidden"><div class="bg-rose-500/10 border border-rose-500/30 text-rose-400 p-3 sm:p-4 rounded-xl mb-4 sm:mb-6 text-xs sm:text-sm font-bold flex items-start gap-2"><i data-lucide="alert-triangle" class="w-4 h-4 sm:w-5 sm:h-5 shrink-0 mt-0.5"></i> <span>تنبيه هام: يرجى تحري الدقة والحذر التام أثناء تسجيل بياناتك.</span></div><div class="text-center mb-6 sm:mb-8"><h2 class="text-xl sm:text-2xl font-black text-white mb-2">إنشاء حساب جديد</h2></div><form onsubmit="JobApp.actions.submitRegister(event)" class="space-y-4"><div><label class="block text-xs sm:text-sm font-bold text-white mb-1">حدد نوع الحساب <span class="text-rose-400">*</span></label><select name="role" required class="w-full px-4 py-3 rounded-xl border border-white/20 bg-slate-900 text-white text-sm sm:text-base"><option value="seeker" ${role === 'seeker' ? 'selected' : ''}>باحث عن عمل (موظف)</option><option value="employer" ${role === 'employer' ? 'selected' : ''}>صاحب عمل (شركة)</option></select></div><div><label class="block text-xs sm:text-sm font-bold text-white mb-1">الاسم الكامل / اسم الشركة <span class="text-rose-400">*</span></label><input name="name" required class="w-full px-4 py-3 rounded-xl border border-white/20 bg-black/20 text-white text-sm sm:text-base" placeholder="أدخل الاسم"></div><div><label class="block text-xs sm:text-sm font-bold text-white mb-1">البريد الإلكتروني <span class="text-rose-400">*</span></label><input name="email" type="email" required class="w-full px-4 py-3 rounded-xl border border-white/20 bg-black/20 text-white text-left text-sm sm:text-base" dir="ltr" placeholder="example@email.com"></div><div><label class="block text-xs sm:text-sm font-bold text-white mb-1">كلمة المرور <span class="text-rose-400">*</span></label><input name="password" type="password" minlength="6" required class="w-full px-4 py-3 rounded-xl border border-white/20 bg-black/20 text-white text-left text-sm sm:text-base" dir="ltr" placeholder="••••••••"></div><div><label class="block text-xs sm:text-sm font-bold text-white mb-1">كود دعوة (اختياري)</label><input name="refCode" dir="ltr" placeholder="WZF-XXXX" class="w-full px-4 py-3 rounded-xl border border-amber-500/30 bg-amber-500/5 text-amber-300 text-left font-bold tracking-widest text-sm sm:text-base"></div><button type="submit" class="w-full bg-gradient-to-r from-cyan-600 to-blue-500 text-white font-bold py-3 sm:py-3.5 rounded-xl shadow-lg mt-4 text-sm sm:text-base">تسجيل ومتابعة</button></form><div class="mt-4 sm:mt-6 text-center text-slate-400 text-xs sm:text-sm">لديك حساب بالفعل؟ <a href="#" onclick="JobAppState.authMode='login'; JobApp.render()" class="text-cyan-400 hover:text-white font-bold">تسجيل الدخول</a></div></div></div>`;
                    }
                },

                home() {
                    const settings = JobAppState.siteSettings;
                    const cSeekers = JobAppState.seekers.length;
                    const cEmployers = JobAppState.employers.length;
                    const cHired = JobAppState.seekers.filter(s => s.isHired).length;

                    let adsHtml = '';
                    if (JobAppState.ads && JobAppState.ads.length > 0) {
                        adsHtml = `
                        <div class="max-w-5xl mx-auto mb-10 md:mb-16">
                            <div class="flex items-center gap-2 mb-4 justify-center md:justify-start opacity-70 text-amber-400">

                            <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-2 md:grid md:grid-cols-4 md:pb-0 snap-x">
                                ${JobAppState.ads.slice(0,4).map(ad => `

                                    <img src="${ad.imageUrl}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 transition-all duration-500 group-hover:scale-110">

                                        <h4 class="text-white font-bold text-sm md:text-base leading-tight drop-shadow-md line-clamp-2">${ad.title}</h4>
                                    </div>
                                </div>
                                `}
                                `).join('')}
                            </div>
                        </div>`;
                    }

                    let tickerHtml = '';
                    if (settings.tickerEnabled !== false) {
                        const tMode = settings.tickerMode || 'auto';
                        const tSpeed = settings.tickerSpeed || 30;
                        let tText = '';
                        
                        if (tMode === 'auto') {
                            tText = `🏢 عدد الشركات المنضمة (${cEmployers} شركة) &nbsp;&nbsp; | &nbsp;&nbsp; 👨‍💼 عدد الموظفين الباحثين (${cSeekers} موظف) &nbsp;&nbsp; | &nbsp;&nbsp; ✅ بفضل الله تم الاتفاق وتوظيف (${cHired} موظف)`;
                        } else if (tMode === 'market') {
                            const today = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                            tText = `<span id="dynamic-ticker-text">📅 تحديث اليوم: ${today} &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 📈 نمو ملحوظ في قطاعات التكنولوجيا والمبيعات في السوق المصري &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 💡 نصيحة مهنية: تطوير مهارات التواصل (Soft Skills) يضاعف من فرص قبولك بنسبة 70% &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 📊 الشركات الناشئة توفر فرص عمل مرنة وتنافسية للكفاءات الشابة &nbsp;&nbsp;&nbsp;&nbsp; 🔴 &nbsp;&nbsp;&nbsp;&nbsp; 🎯 كتابة سيرة ذاتية واضحة ومختصرة هي بوابتك الأولى للوصول للمقابلة الشخصية</span>`;
                            setTimeout(() => { if(window.fetchMarketNews) window.fetchMarketNews(); }, 100);
                        } else {
                            tText = settings.tickerManualText || 'أهلاً بكم في المنصة...';
                        }

                        tickerHtml = `
                        <div class="w-full bg-[#0a1128]/90 border-b border-blue-900/50 text-white marquee-container shadow-lg relative z-40 overflow-hidden flex items-center h-10 md:h-12 backdrop-blur-md">
                            <div class="absolute right-0 top-0 bottom-0 bg-[#050814] px-3 sm:px-4 flex items-center justify-center font-black text-xs sm:text-sm shadow-[10px_0_20px_rgba(0,0,0,0.9)] z-20 border-l border-blue-500/30 text-amber-400 shrink-0">
                                <i data-lucide="radio" class="w-3 h-3 sm:w-4 sm:h-4 ml-1 sm:ml-2 animate-pulse text-rose-500"></i> أخبار الموقع
                            </div>
                            <div class="animate-ticker text-sm sm:text-base font-bold text-blue-100" style="animation-duration: ${tSpeed}s;">
                                ${tText}
                            </div>
                        </div>`;
                    }

                    return `
                    ${tickerHtml}
                    <div class="max-w-7xl mx-auto px-4 pt-8 sm:pt-12 pb-16 fade-in text-center">
                        ${adsHtml}
                        <h2 class="text-3xl sm:text-4xl md:text-6xl font-extrabold text-white mb-4 sm:mb-6 drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] flex items-center justify-center gap-2 sm:gap-4 flex-wrap">

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4 max-w-5xl mx-auto mb-8 sm:mb-12">
                            <div class="bg-blue-900/30 border border-blue-500/30 p-3 sm:p-4 rounded-2xl shadow-lg"><i data-lucide="eye" class="w-6 h-6 sm:w-8 sm:h-8 text-blue-400 mx-auto mb-2"></i><div class="text-2xl sm:text-3xl font-black text-white">${settings.visitorsCount}</div><div class="text-xs sm:text-sm font-bold text-blue-300">زيارات المنصة</div></div>

                            <div class="bg-purple-900/30 border border-purple-500/30 p-3 sm:p-4 rounded-2xl shadow-lg"><i data-lucide="building-2" class="w-6 h-6 sm:w-8 sm:h-8 text-purple-400 mx-auto mb-2"></i><div class="text-2xl sm:text-3xl font-black text-white">${cEmployers}</div><div class="text-xs sm:text-sm font-bold text-purple-300">الشركات المنضمة</div></div>
                            <div class="bg-emerald-900/30 border border-emerald-500/30 p-3 sm:p-4 rounded-2xl shadow-lg"><i data-lucide="briefcase" class="w-6 h-6 sm:w-8 sm:h-8 text-emerald-400 mx-auto mb-2"></i><div class="text-2xl sm:text-3xl font-black text-white">${cHired}</div><div class="text-xs sm:text-sm font-bold text-emerald-300">تم الاتفاق</div></div>
                        </div>

                            <div class="relative group cursor-pointer h-full" onclick="${JobAppState.loggedInUser ? "JobApp.navigate('seeker_profile')" : "JobApp.actions.startAuth('register', 'seeker')"}">
                                <div class="absolute inset-0 bg-gradient-to-b from-blue-400 to-blue-800 rounded-3xl blur-md opacity-40 group-hover:opacity-70 transition-opacity"></div>
                                <div class="relative h-full glass-panel rounded-3xl flex flex-col items-center text-center shadow-[inset_0_0_30px_rgba(59,130,246,0.1)] hover:-translate-y-2 transition-transform overflow-hidden p-6 sm:p-10">
                                    <h3 class="text-2xl sm:text-3xl font-extrabold text-white mb-6 sm:mb-8">بوابة الباحث عن عمل</h3>
                                    <button class="mt-auto w-full bg-gradient-to-r from-blue-600 to-blue-400 text-white font-bold text-lg sm:text-xl py-3 sm:py-4 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.6)]">أنشئ حسابك وسجل بياناتك</button>
                                </div>
                            </div>
                            <div class="relative group cursor-pointer h-full" onclick="${JobAppState.loggedInUser ? "JobApp.navigate('employer_profile')" : "JobApp.actions.startAuth('register', 'employer')"}">
                                <div class="absolute inset-0 bg-gradient-to-b from-purple-400 to-purple-800 rounded-3xl blur-md opacity-40 group-hover:opacity-70 transition-opacity"></div>
                                <div class="relative h-full glass-panel rounded-3xl flex flex-col items-center text-center shadow-[inset_0_0_30px_rgba(168,85,247,0.1)] hover:-translate-y-2 transition-transform overflow-hidden p-6 sm:p-10">
                                    <h3 class="text-2xl sm:text-3xl font-extrabold text-white mb-6 sm:mb-8">بوابة صاحب العمل</h3>
                                    <button class="mt-auto w-full bg-gradient-to-r from-purple-600 to-purple-400 text-white font-bold text-lg sm:text-xl py-3 sm:py-4 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.6)]">بوابة أصحاب الشركات</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                },

                about() { return `<div class="max-w-4xl mx-auto mt-10 sm:mt-20 p-4 sm:p-10"><div class="glass-panel rounded-3xl shadow-[0_0_50px_rgba(59,130,246,0.1)] fade-in p-6 sm:p-10"><div class="text-center mb-6 sm:mb-8"><h2 class="text-3xl sm:text-4xl font-black text-white mb-4">من نحن</h2><div class="w-16 sm:w-20 h-1 bg-gradient-to-r from-blue-500 to-cyan-400 mx-auto rounded-full"></div></div><p class="text-slate-200 text-base sm:text-xl leading-loose text-center whitespace-pre-wrap font-medium">${JobAppState.siteSettings.aboutUs}</p></div></div>`; },
                
                contact() {
                    const settings = JobAppState.siteSettings;
                    return `
                    <div class="max-w-5xl mx-auto px-4 pt-8 md:pt-12 fade-in">
                        <div class="text-center mb-8 md:mb-10">
                            <h2 class="text-3xl md:text-4xl font-black text-white mb-4">تواصل معنا</h2>

                seeker_form() {
                    if (!JobAppState.loggedInUser || JobAppState.loggedInUser.role !== 'seeker') return `<div class="text-center mt-20 text-xl font-bold">يرجى تسجيل الدخول أولاً كباحث عن عمل.</div>`;

                    const getFieldsHTML = (section) => {
                        const fields = JobAppState.formFields.filter(f => f.section === section && f.visible);
                        if(fields.length === 0) return '';
                        return fields.map(f => {
                            const req = f.required ? '<span class="text-rose-400">*</span>' : '';
                            const fullW = f.type === 'textarea' || f.label.length > 50 ? 'md:col-span-2' : '';
                            let val = JobAppState.loggedInUser.formData && JobAppState.loggedInUser.formData[f.id] ? JobAppState.loggedInUser.formData[f.id] : '';
                            if(!val) { if(f.label.includes('الاسم')) val = JobAppState.loggedInUser.name; if(f.type === 'email') val = JobAppState.loggedInUser.email; if(f.type === 'tel' && f.id === 'f8') val = JobAppState.loggedInUser.phone || ''; }

                            let inputHtml = '';
                            if (f.id === 'f3') inputHtml = `<input name="${f.id}" value="${val}" type="text" dir="ltr" required pattern="\\d{14}" maxlength="14" minlength="14" oninput="this.value=this.value.replace(/[^0-9]/g,'');" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-sm sm:text-base outline-none focus:border-blue-400 text-left">`;
                            else if(f.type === 'select') inputHtml = `<select name="${f.id}" ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-sm sm:text-base outline-none focus:border-blue-400 appearance-none"><option value="">اختر...</option>${f.options.map(o=>`<option value="${o}" ${val===o?'selected':''} class="bg-slate-900">${o}</option>`).join('')}</select>`;
                            else if(f.type === 'textarea') inputHtml = `<textarea name="${f.id}" ${f.required?'required':''} rows="3" class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-sm sm:text-base outline-none focus:border-blue-400 resize-none">${val}</textarea>`;
                            else inputHtml = `<input name="${f.id}" value="${val}" type="${f.type}" ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'dir="ltr"' : ''} ${f.required?'required':''} class="w-full px-4 py-3 rounded-xl bg-black/30 border border-white/20 text-white text-sm sm:text-base outline-none focus:border-blue-400 ${f.type==='email' || f.type==='tel' || f.type==='date' ? 'text-left' : ''}">`;

                },

                seeker_profile() {

                                <button onclick="JobApp.actions.setAdFormType('internal')" class="px-4 py-2 rounded-xl font-bold text-sm transition-colors ${JobAppState.adFormType === 'internal' ? 'bg-purple-600 text-white' : 'bg-slate-800 text-slate-400'}">صفحة داخلية مخصصة</button>
                            </div>
                            <form onsubmit="JobApp.actions.handleAddAd(event)" class="space-y-4 sm:space-y-6" autocomplete="off">
                                <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1 sm:mb-2">عنوان الإعلان</label><input name="title" required class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none"></div>
                                <div class="flex items-center gap-4">
                                    <label class="cursor-pointer bg-white/5 border border-dashed border-blue-500/50 p-4 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition-colors w-1/3">
                                        <i data-lucide="image" class="text-blue-400"></i><span class="text-xs sm:text-sm text-blue-300 font-bold">رفع صورة</span>
                                        <input type="file" accept="image/*" class="hidden" onchange="JobApp.actions.uploadImage(this, 'tempAdImage')">
                                    </label>
                                    <div class="flex-grow">
                                        <label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">أو رابط الصورة الخارجي</label>
                                        <input name="imageUrl" dir="ltr" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none text-left">
                                    </div>
                                </div>
                                ${JobAppState.tempAdImage ? `<div class="w-24 h-24 rounded-xl overflow-hidden border-2 border-blue-500/50"><img src="${JobAppState.tempAdImage}" class="w-full h-full object-cover"></div>` : ''}

                                ${JobAppState.adFormType === 'external' ? `
                                    <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1 sm:mb-2">وصف قصير</label><input name="description" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none"></div>
                                    <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1 sm:mb-2">الرابط المباشر للموقع/الإعلان</label><input name="link" type="url" dir="ltr" required class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none text-left"></div>
                                ` : `
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">عنوان الصفحة الداخلية</label><input name="pageTitle" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none"></div>
                                        <div class="flex gap-4">
                                            <div class="w-1/2"><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">لون الخلفية</label><input type="color" name="bgColor" value="#050814" class="w-full h-12 rounded-xl bg-slate-900 border border-slate-700"></div>
                                            <div class="w-1/2"><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">لون النص</label><input type="color" name="textColor" value="#ffffff" class="w-full h-12 rounded-xl bg-slate-900 border border-slate-700"></div>
                                        </div>
                                    </div>
                                    <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">محتوى الصفحة بالتفصيل</label><textarea name="pageContent" required rows="6" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none resize-y"></textarea></div>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">رقم واتساب للتواصل</label><input name="whatsapp" type="tel" dir="ltr" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none text-left"></div>
                                        <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">رابط زر إضافي (اختياري)</label><input name="urlLink" type="url" dir="ltr" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none text-left"></div>
                                        <div><label class="block text-xs sm:text-sm font-bold text-slate-300 mb-1">نص الزر الإضافي</label><input name="urlText" class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none"></div>
                                    </div>
                                `}
                                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-lg flex items-center justify-center gap-2"><i data-lucide="plus" class="w-5 h-5"></i> نشر الإعلان</button>
                            </form>
                        </div>

                        <div class="glass-panel p-4 sm:p-6 rounded-3xl border border-white/10">
                            <h3 class="text-base sm:text-lg font-bold text-white mb-4">الإعلانات النشطة (${JobAppState.ads.length})</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                ${JobAppState.ads.map(ad => `
                                    <div class="bg-black/40 rounded-xl overflow-hidden border border-white/10 group relative">
                                        <img src="${ad.imageUrl}" class="w-full h-32 object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                                        <div class="p-3">
                                            <h4 class="text-white font-bold text-sm truncate mb-1">${ad.title}</h4>
                                            <p class="text-xs text-blue-400">${ad.type === 'external' ? 'رابط خارجي' : 'صفحة مخصصة'}</p>
                                        </div>
                                        <button onclick="JobApp.actions.deleteAd('${ad.id}')" class="absolute top-2 left-2 bg-rose-600 hover:bg-rose-500 text-white p-1.5 rounded-lg shadow-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        `;
                    }

                    if (admin.type === 'super_admin' && JobAppState.adminTab === 'messages') {
                        tabContent = `
                        <div class="glass-panel p-4 sm:p-6 md:p-8 rounded-3xl border border-white/10 shadow-lg">
                            <h3 class="text-lg sm:text-xl md:text-2xl font-bold text-white mb-4 sm:mb-6 flex items-center gap-2"><i data-lucide="message-square" class="text-blue-400 w-5 h-5 sm:w-6 sm:h-6"></i> صندوق الرسائل والشكاوى</h3>
                            <div class="grid gap-3 sm:gap-4">
                                ${JobAppState.messages.length === 0 ? '<div class="text-center text-slate-400 py-8 border border-dashed border-white/10 rounded-2xl bg-black/20 font-bold">لا توجد رسائل جديدة.</div>' : ''}
                                ${JobAppState.messages.map(m => `
                                    <div class="bg-black/30 p-4 sm:p-6 rounded-2xl border border-white/5 hover:border-blue-500/30 transition-colors">
                                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-4">
                                            <div>
                                                <h4 class="text-white font-black text-sm sm:text-base mb-1">${m.subject}</h4>
                                                <div class="text-[10px] sm:text-xs text-slate-400 flex flex-wrap gap-2 items-center">
                                                    <span class="text-blue-300 font-bold"><i data-lucide="user" class="inline w-3 h-3"></i> ${m.name}</span> | 
                                                    <span dir="ltr" class="font-mono text-emerald-400"><i data-lucide="phone" class="inline w-3 h-3"></i> ${m.contact}</span> | 
                                                    <span>${m.date}</span>
                                                </div>
                                            </div>
                                            <div class="flex gap-2">
                                                <a href="${JobApp.whatsappLink(m.contact)}" target="_blank" class="bg-green-600/20 text-green-400 hover:bg-green-600 hover:text-white p-2 rounded-xl transition-colors"><i data-lucide="message-circle" class="w-4 h-4"></i></a>
                                                <button onclick="JobApp.actions.deleteMessage('${m.id}')" class="bg-rose-600/20 text-rose-400 hover:bg-rose-600 hover:text-white p-2 rounded-xl transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                        <p class="text-slate-300 text-xs sm:text-sm whitespace-pre-wrap leading-relaxed bg-black/20 p-3 sm:p-4 rounded-xl border border-white/5">${m.content}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        `;
                    }

                    return `
                    <div class="max-w-7xl mx-auto px-2 sm:px-4 pt-4 sm:pt-8 pb-10 fade-in flex flex-col md:flex-row gap-4 sm:gap-6">
                        <aside class="w-full md:w-64 shrink-0">
                            <div class="glass-panel rounded-3xl p-4 sticky top-24 shadow-xl border border-white/10">
                                <div class="text-center mb-4 pb-4 border-b border-white/10">
                                    <div class="w-12 h-12 sm:w-16 sm:h-16 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center mx-auto mb-2 border border-emerald-500/30">
                                        <i data-lucide="shield-check" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                                    </div>
                                    <h2 class="text-white font-black text-sm sm:text-base truncate">${admin.name}</h2>
                                    <span class="text-[10px] sm:text-xs font-bold text-emerald-400">${admin.role}</span>
                                </div>
                                <nav class="flex flex-col gap-1.5 sm:gap-2">
                                    <button onclick="JobAppState.adminTab='system_admins'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center gap-3 ${JobAppState.adminTab==='system_admins' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/5'}"><i data-lucide="shield" class="w-4 h-4 sm:w-5 sm:h-5"></i> مدراء النظام</button>
                                    <button onclick="JobAppState.adminTab='users'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center gap-3 ${JobAppState.adminTab==='users' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/5'}"><i data-lucide="users" class="w-4 h-4 sm:w-5 sm:h-5"></i> الأعضاء (${JobAppState.seekers.length + JobAppState.employers.length})</button>
                                    <button onclick="JobAppState.adminTab='requests'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center justify-between ${JobAppState.adminTab==='requests' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/5'}">
                                        <div class="flex items-center gap-3"><i data-lucide="briefcase" class="w-4 h-4 sm:w-5 sm:h-5"></i> الطلبات</div>
                                        ${JobAppState.requests.length > 0 ? `<span class="bg-rose-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">${JobAppState.requests.length}</span>` : ''}
                                    </button>
                                    ${admin.type === 'super_admin' ? `
                                        <button onclick="JobAppState.adminTab='messages'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center justify-between ${JobAppState.adminTab==='messages' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/5'}">
                                            <div class="flex items-center gap-3"><i data-lucide="mail" class="w-4 h-4 sm:w-5 sm:h-5"></i> الرسائل</div>
                                            ${JobAppState.messages.length > 0 ? `<span class="bg-rose-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">${JobAppState.messages.length}</span>` : ''}
                                        </button>
                                        <button onclick="JobAppState.adminTab='ads'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center gap-3 ${JobAppState.adminTab==='ads' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-white/5'}"><i data-lucide="megaphone" class="w-4 h-4 sm:w-5 sm:h-5"></i> الإعلانات (${JobAppState.ads.length})</button>
                                        <div class="h-px bg-white/10 my-2"></div>
                                        <button onclick="JobAppState.adminTab='form_builder'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center gap-3 ${JobAppState.adminTab==='form_builder' ? 'bg-amber-600 text-white' : 'text-slate-400 hover:bg-white/5 hover:text-amber-400'}"><i data-lucide="layout-template" class="w-4 h-4 sm:w-5 sm:h-5"></i> مصمم الاستمارة</button>
                                        <button onclick="JobAppState.adminTab='settings'; JobApp.render()" class="w-full text-right px-4 py-2.5 sm:py-3 rounded-xl font-bold transition-all text-xs sm:text-sm flex items-center gap-3 ${JobAppState.adminTab==='settings' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:bg-white/5 hover:text-emerald-400'}"><i data-lucide="settings" class="w-4 h-4 sm:w-5 sm:h-5"></i> الإعدادات الأساسية</button>
                                    ` : ''}
                                </nav>
                            </div>
                        </aside>
                        <div class="flex-grow min-w-0">${tabContent}</div>
                    </div>`;
                },
                
                success() {
                    let pdfBtnHtml = '';
                    if (JobAppState.lastSubmittedSeeker) {
                        pdfBtnHtml = `
                            <button onclick="JobApp.actions.downloadPDF()" class="bg-gradient-to-r from-red-600 to-red-500 text-white font-bold px-6 py-3 rounded-xl shadow-lg flex items-center justify-center gap-2 w-full mb-4 text-sm md:text-base hover:scale-[1.02] transition-transform">
                                <i data-lucide="file-down" class="w-5 h-5"></i> تحميل الاستمارة (PDF)
                            </button>
                        `;
                    }
                    return `
                    <div class="flex items-center justify-center min-h-[60vh] p-4 fade-in">
                        <div class="glass-panel p-6 sm:p-8 md:p-12 rounded-3xl text-center max-w-lg w-full border border-green-500/30 shadow-[0_0_50px_rgba(34,197,94,0.2)]">
                            <i data-lucide="check-circle-2" class="w-12 h-12 sm:w-16 sm:h-16 md:w-20 md:h-20 text-green-400 mx-auto mb-4 md:mb-6"></i>
                            <h2 class="text-xl sm:text-2xl md:text-3xl font-black text-white mb-2 sm:mb-4">تمت العملية بنجاح!</h2>
                            <p class="text-xs sm:text-sm md:text-base text-slate-300 mb-6 sm:mb-8">تم حفظ وتحديث بياناتك في المنصة.</p>
                            ${pdfBtnHtml}
                            <button onclick="JobApp.navigate('seeker_profile')" class="mt-4 bg-blue-600 text-white font-bold px-6 md:px-8 py-3 md:py-4 rounded-xl w-full hover:bg-blue-500 flex items-center justify-center gap-2 shadow-lg transition-all hover:-translate-y-1 text-sm md:text-base">العودة لحسابي <i data-lucide="arrow-left" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                        </div>
                    </div>`;
                }
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            JobApp.init();
            seedDefaultsAndCount();
        });
    </script>
</body>
</html>
